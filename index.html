            <div style="margin-top:20px;padding:15px;background:white;border-radius:8px;border:1px solid #e2e8f0;">
                <h3 style="margin-top:0;">Confidence Level:</h3>
                <div class="control-row">
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                        <input type="radio" name="logConf" value="0.90" onchange="updateCurrentTab()"> 90%
                    </label>
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                        <input type="radio" name="logConf" value="0.95" checked onchange="updateCurrentTab()"> 95%
                    </label>
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                        <input type="radio" name="logConf" value="0.99" onchange="updateCurrentTab()"> 99%
                    </label>
                </div>
            </div>
        </div>

        <div id="logResults"  class="results-table-container"></div>
        <div id="logAdjResults" class="results-table-container" style="margin-top:20px;"></div>
        <div class="chart-row" style="margin-top:20px;">
            <div class="chart-container"><canvas id="logROCChart"></canvas></div>
            <div class="chart-container"><canvas id="logCalibChart"></canvas></div>
        </div>
        <div class="interpretation-box" id="logInterpretation"></div>`;
}

function refreshLogisticPredictors() {
    const yVar = getSelectedRadio('logY');
    const prev = new Set(getSelectedCheckboxes('logX'));
    const grid = document.getElementById('logXGrid');
    if (!grid) return;

    // Update outcome info panel
    const infoEl = document.getElementById('logOutcomeInfo');
    if (infoEl && yVar) {
        const vals = data.map(d => d[yVar]).filter(v => v !== undefined && v !== null && v !== '');
        const unique = [...new Set(vals.map(String))].sort();
        if (unique.length === 2) {
            infoEl.innerHTML = `<div style="background:#f0fff4;border-left:4px solid #48bb78;padding:8px 14px;border-radius:4px;font-size:0.9em;">
                ✅ Binary outcome detected &nbsp;|&nbsp; <strong>0 (reference):</strong> "${unique[0]}" &nbsp;|&nbsp; <strong>1 (event):</strong> "${unique[1]}"
                &nbsp;|&nbsp; Event rate: ${((vals.filter(v=>String(v)===unique[1]).length/vals.length)*100).toFixed(1)}%
            </div>`;
        } else {
            infoEl.innerHTML = `<div class="warning-box">⚠️ "${yVar}" has ${unique.length} unique values. Logistic regression requires exactly 2.</div>`;
        }
    }

    // Build predictor list excluding Y
    const numPs = numericCols.filter(c => c !== yVar);
    const catPs = categoricalCols.filter(c => c !== yVar);

    grid.innerHTML = [
        ...numPs.map(col => `<div class="variable-item">
            <input type="checkbox" data-group="logX" id="logX_${col}" value="${col}"
                   onchange="updateCurrentTab();" ${prev.has(col) ? 'checked' : ''}>
            <label for="logX_${col}">${col}</label>
            <span class="badge badge-numeric">numeric</span>
        </div>`),
        ...catPs.map(col => `<div class="variable-item">
            <input type="checkbox" data-group="logX" id="logX_${col}" value="${col}"
                   onchange="updateCurrentTab();" ${prev.has(col) ? 'checked' : ''}>
            <label for="logX_${col}">${col}</label>
            <span class="badge badge-categorical">categorical</span>
        </div>`)
    ].join('');
}

function logSelectAll() {
    const yVar = getSelectedRadio('logY');
    document.querySelectorAll('input[data-group="logX"]').forEach(cb => {
        if (cb.value !== yVar) cb.checked = true;
    });
    updateCurrentTab();
}

function initLogistic() {
    refreshLogisticPredictors();
    updateLogistic();
}

function updateLogistic() {
    const yVar  = getSelectedRadio('logY');
    const xVars = getSelectedCheckboxes('logX').filter(x => x !== yVar);
    const conf  = parseFloat(getSelectedRadio('logConf') || '0.95');
    const alpha = 1 - conf;
    const zCrit = zInv(1 - alpha / 2);

    const resEl  = document.getElementById('logResults');
    const adjEl  = document.getElementById('logAdjResults');
    const intEl  = document.getElementById('logInterpretation');

    if (!yVar) { resEl.innerHTML = '<p style="text-align:center;padding:20px">Select an outcome variable (Y)</p>'; adjEl.innerHTML = ''; intEl.innerHTML = ''; return; }
    if (!xVars.length) { resEl.innerHTML = '<p style="text-align:center;padding:20px">Select at least one predictor (X)</p>'; adjEl.innerHTML = ''; intEl.innerHTML = ''; return; }

    // Determine binary encoding of Y
    const allYVals = data.map(d => d[yVar]).filter(v => v !== undefined && v !== null && v !== '');
    const uniqueY  = [...new Set(allYVals.map(String))].sort();
    if (uniqueY.length !== 2) {
        resEl.innerHTML = `<div class="warning-box">⚠️ Outcome variable must have exactly 2 unique values. Found: ${uniqueY.length}.</div>`;
        adjEl.innerHTML = ''; intEl.innerHTML = ''; return;
    }
    const refLevel   = uniqueY[0];  // → 0
    const eventLevel = uniqueY[1];  // → 1

    // Filter complete cases
    const validData = data.filter(d => {
        const yv = d[yVar];
        if (yv === undefined || yv === null || yv === '') return false;
        if (![refLevel, eventLevel].includes(String(yv))) return false;
        return xVars.every(x => {
            const v = d[x];
            if (v === undefined || v === null || v === '') return false;
            if (numericCols.includes(x)) return typeof v === 'number' && !isNaN(v);
            return true;
        });
    });

    const n = validData.length;
    if (n < xVars.length + 5) {
        resEl.innerHTML = `<div class="warning-box">Not enough complete cases (${n}).</div>`;
        adjEl.innerHTML = ''; intEl.innerHTML = ''; return;
    }

    const yArr = validData.map(d => String(d[yVar]) === eventLevel ? 1 : 0);
    const nEvents = yArr.reduce((s, v) => s + v, 0);

    resEl.innerHTML = '<p style="padding:20px;text-align:center">⏳ Fitting models…</p>';
    adjEl.innerHTML = '';

    setTimeout(() => {
        try {
            // ── Build adjusted model design matrix ──────────────
            const { specs, getRow, k } = buildLogisticDesign(xVars, validData);
            const XrowsAdj = validData.map(row => [1, ...getRow(row)]);

            // ── Fit adjusted (multivariable) model ───────────────
            const adjFit = fitLogistic(XrowsAdj, yArr);
            if (!adjFit.converged) console.warn('Logistic IRLS did not converge');

            // ── Null model log-likelihood ────────────────────────
            const pBar = nEvents / n;
            const llNull = yArr.reduce((s, yi) => s + (yi===1 ? Math.log(Math.max(pBar,1e-15)) : Math.log(Math.max(1-pBar,1e-15))), 0);

            // ── Model fit stats ──────────────────────────────────
            const llModel  = adjFit.logLik;
            const G2       = 2 * (llModel - llNull);                   // likelihood ratio chi-sq
            const G2p      = chiSqPValue(G2, k);
            const mcFadden = 1 - llModel / llNull;                     // McFadden pseudo-R²
            const nagelkerke = (() => {
                const cox = 1 - Math.exp(2 * (llNull - llModel) / n);
                const max = 1 - Math.exp(2 * llNull / n);
                return cox / max;
            })();
            const aic = -2 * llModel + 2 * (k + 1);

            // ── Predicted probabilities & classification ─────────
            const predProb = XrowsAdj.map(row => sigmoid(row.reduce((s,xi,j)=>s+xi*adjFit.beta[j],0)));
            const predClass = predProb.map(p => p >= 0.5 ? 1 : 0);
            const TP = predClass.reduce((s,p,i)=>s+(p===1&&yArr[i]===1?1:0),0);
            const TN = predClass.reduce((s,p,i)=>s+(p===0&&yArr[i]===0?1:0),0);
            const FP = predClass.reduce((s,p,i)=>s+(p===1&&yArr[i]===0?1:0),0);
            const FN = predClass.reduce((s,p,i)=>s+(p===0&&yArr[i]===1?1:0),0);
            const accuracy  = (TP+TN)/n;
            const sens      = TP/(TP+FN) || 0;
            const spec      = TN/(TN+FP) || 0;
            const ppv       = TP/(TP+FP) || 0;
            const npv       = TN/(TN+FN) || 0;

            // ── AUC via trapezoidal ROC ──────────────────────────
            const rocPts = buildROC(yArr, predProb);
            const auc    = computeAUC(rocPts);

            // ── Helper: format OR row ────────────────────────────
            function orRow(label, beta, se, indent=false, groupHeader=null) {
                const or   = Math.exp(beta);
                const lo   = Math.exp(beta - zCrit * se);
                const hi   = Math.exp(beta + zCrit * se);
                const z    = beta / se;
                const p    = zPValue(z);
                const sig  = p < 0.05;
                const pad  = indent ? 'style="padding-left:24px"' : '';
                let html = '';
                if (groupHeader) html += `<tr style="background:#f0f4ff"><td colspan="7" style="font-weight:600;color:#4a5568;padding:6px 12px;">${groupHeader}</td></tr>`;
                html += `<tr>
                    <td ${pad}>${label}</td>
                    <td>${beta.toFixed(3)}</td>
                    <td><strong>${or.toFixed(3)}</strong></td>
                    <td>${lo.toFixed(3)} – ${hi.toFixed(3)}</td>
                    <td>${z.toFixed(3)}</td>
                    <td>${fmtP(p)}</td>
                    <td><span class="status-badge ${sig?'status-significant':'status-not-significant'}">${sig?'✓':'✗'}</span></td>
                </tr>`;
                return html;
            }

            const tableHeader = `<tr>
                <th>Term</th><th>β (log-OR)</th><th>OR</th>
                <th>${(conf*100).toFixed(0)}% CI (OR)</th>
                <th>z</th><th>p-value</th><th>Sig.</th>
            </tr>`;

            // ── UNADJUSTED ORs (simple logistic, one predictor at a time) ─
            let unadjRows = '';
            let ci2 = 0; // adjusted model coefficient index (skip intercept)
            for (const s of specs) {
                const xvSingle = [s.v];
                const { specs: sp1, getRow: gr1 } = buildLogisticDesign(xvSingle, validData);
                const Xu = validData.map(row => [1, ...gr1(row)]);
                let uFit;
                try { uFit = fitLogistic(Xu, yArr); } catch { ci2 += s.type==='num'?1:s.dummies.length; continue; }

                if (s.type === 'num') {
                    const se = Math.sqrt(Math.max(0, uFit.vcov[1][1]));
                    unadjRows += orRow(s.v, uFit.beta[1], se);
                    ci2++;
                } else {
                    unadjRows += `<tr style="background:#f0f4ff"><td colspan="7" style="font-weight:600;color:#4a5568;padding:6px 12px;">
                        📋 ${s.v} <small style="font-weight:normal">(ref: <em>${s.reference}</em>)</small></td></tr>`;
                    s.dummies.forEach((d, di) => {
                        const se = Math.sqrt(Math.max(0, uFit.vcov[di+1][di+1]));
                        unadjRows += orRow(`${s.v} = ${d}`, uFit.beta[di+1], se, true);
                        ci2++;
                    });
                }
            }

            // ── ADJUSTED ORs (from full multivariable model) ─────
            let adjRows = '';
            // Intercept
            const intSE = Math.sqrt(Math.max(0, adjFit.vcov[0][0]));
            adjRows += `<tr style="background:#fafafa"><td><em>(Intercept)</em></td>
                <td>${adjFit.beta[0].toFixed(3)}</td><td>—</td><td>—</td>
                <td>${(adjFit.beta[0]/intSE).toFixed(3)}</td><td>${fmtP(zPValue(adjFit.beta[0]/intSE))}</td><td>—</td></tr>`;

            let ci = 1;
            for (const s of specs) {
                if (s.type === 'num') {
                    const se = Math.sqrt(Math.max(0, adjFit.vcov[ci][ci]));
                    adjRows += orRow(s.v, adjFit.beta[ci], se);
                    ci++;
                } else {
                    adjRows += `<tr style="background:#f0f4ff"><td colspan="7" style="font-weight:600;color:#4a5568;padding:6px 12px;">
                        📋 ${s.v} <small style="font-weight:normal">(ref: <em>${s.reference}</em>)</small></td></tr>`;
                    s.dummies.forEach(d => {
                        const se = Math.sqrt(Math.max(0, adjFit.vcov[ci][ci]));
                        adjRows += orRow(`${s.v} = ${d}`, adjFit.beta[ci], se, true);
                        ci++;
                    });
                }
            }

            // ── OR interpretation text ───────────────────────────
            function interpretOR(label, or, lo, hi, p, isRef=false) {
                if (isRef) return `<li><strong>${label}</strong>: reference category.</li>`;
                const dir = or > 1 ? 'higher' : 'lower';
                const pct = or > 1 ? ((or-1)*100).toFixed(1) : ((1-or)*100).toFixed(1);
                const sig = p < 0.05;
                return `<li><strong>${label}</strong>: OR = ${or.toFixed(3)} (${(conf*100).toFixed(0)}% CI: ${lo.toFixed(3)}–${hi.toFixed(3)}),
                    p = ${fmtP(p)}. ${sig
                        ? `Statistically significant. Each unit increase is associated with <strong>${pct}% ${dir} odds</strong> of ${eventLevel}.`
                        : `Not statistically significant (p ≥ ${alpha.toFixed(2)}).`}</li>`;
            }

            let interpItems = '';
            ci = 1;
            for (const s of specs) {
                if (s.type === 'num') {
                    const or=Math.exp(adjFit.beta[ci]), lo=Math.exp(adjFit.beta[ci]-zCrit*Math.sqrt(Math.max(0,adjFit.vcov[ci][ci]))), hi=Math.exp(adjFit.beta[ci]+zCrit*Math.sqrt(Math.max(0,adjFit.vcov[ci][ci])));
                    interpItems += interpretOR(s.v, or, lo, hi, zPValue(adjFit.beta[ci]/Math.sqrt(Math.max(1e-10,adjFit.vcov[ci][ci]))));
                    ci++;
                } else {
                    interpItems += `<li><strong>${s.v}</strong> (reference = "${s.reference}"):<ul>`;
                    s.dummies.forEach(d => {
                        const or=Math.exp(adjFit.beta[ci]), lo=Math.exp(adjFit.beta[ci]-zCrit*Math.sqrt(Math.max(0,adjFit.vcov[ci][ci]))), hi=Math.exp(adjFit.beta[ci]+zCrit*Math.sqrt(Math.max(0,adjFit.vcov[ci][ci])));
                        interpItems += interpretOR(`${s.v} = ${d}`, or, lo, hi, zPValue(adjFit.beta[ci]/Math.sqrt(Math.max(1e-10,adjFit.vcov[ci][ci]))));
                        ci++;
                    });
                    interpItems += `</ul></li>`;
                }
            }

            // ── Draw charts ──────────────────────────────────────
            drawROCChart(rocPts, auc);
            drawCalibrationChart(yArr, predProb);

            lastResults['Logistic'] = `AUC=${auc.toFixed(3)}, McFadden R²=${mcFadden.toFixed(3)}, AIC=${aic.toFixed(1)}`;

            // ── Render tables ────────────────────────────────────
            resEl.innerHTML = `
                <h3>Unadjusted Odds Ratios — ${eventLevel} vs ${refLevel}</h3>
                <p style="font-size:0.85em;color:#718096;margin-bottom:8px;">Each predictor fitted separately in a simple logistic model.</p>
                <table class="results-table">${tableHeader}${unadjRows}</table>`;

            adjEl.innerHTML = `
                <h3>Adjusted Odds Ratios — Multivariable Model (${xVars.length} predictor${xVars.length>1?'s':''})</h3>
                <p style="font-size:0.85em;color:#718096;margin-bottom:8px;">All predictors included simultaneously.</p>
                <table class="results-table">${tableHeader}${adjRows}</table>
                <div style="background:#f8f9fa;padding:12px 16px;border-radius:6px;margin-top:10px;font-size:0.9em;display:flex;flex-wrap:wrap;gap:20px;">
                    <span>n = ${n}</span>
                    <span>Events = ${nEvents} (${(nEvents/n*100).toFixed(1)}%)</span>
                    <span>Log-Lik = ${llModel.toFixed(2)}</span>
                    <span>LR χ²(${k}) = ${G2.toFixed(2)}, p = ${fmtP(G2p)}</span>
                    <span>McFadden R² = ${mcFadden.toFixed(3)}</span>
                    <span>Nagelkerke R² = ${nagelkerke.toFixed(3)}</span>
                    <span>AIC = ${aic.toFixed(1)}</span>
                    <span>AUC = ${auc.toFixed(3)}</span>
                    <span>${adjFit.converged ? '✅ Converged' : '⚠️ Did not converge'} (${adjFit.iter} iter)</span>
                </div>
                <div style="margin-top:10px;padding:12px 16px;background:#f8f9fa;border-radius:6px;font-size:0.9em;">
                    <strong>Classification (threshold = 0.5):</strong>
                    Accuracy = ${(accuracy*100).toFixed(1)}% &nbsp;|&nbsp;
                    Sensitivity = ${(sens*100).toFixed(1)}% &nbsp;|&nbsp;
                    Specificity = ${(spec*100).toFixed(1)}% &nbsp;|&nbsp;
                    PPV = ${(ppv*100).toFixed(1)}% &nbsp;|&nbsp;
                    NPV = ${(npv*100).toFixed(1)}%
                    <br><small>TP=${TP} TN=${TN} FP=${FP} FN=${FN}</small>
                </div>`;

            intEl.innerHTML = `
                <strong>Adjusted OR Interpretations</strong> (outcome = "${eventLevel}", reference = "${refLevel}"):
                <ul style="margin-top:10px;padding-left:20px;line-height:1.9;">${interpItems}</ul>
                <p style="margin-top:12px;font-size:0.9em;color:#555;">
                    <strong>Note:</strong> ORs from the adjusted model control for all other predictors simultaneously.
                    Unadjusted ORs reflect each predictor's crude association with the outcome.
                    Confounding is indicated when adjusted and unadjusted ORs differ substantially.
                </p>`;

        } catch (err) {
            resEl.innerHTML = `<div class="warning-box">⚠️ Logistic regression failed: ${err.message}</div>`;
            console.error(err);
        }
    }, 30);
}

// ── ROC curve ────────────────────────────────────────────────
function buildROC(y, prob) {
    const pairs = prob.map((p, i) => ({p, y: y[i]})).sort((a, b) => b.p - a.p);
    const nPos = y.reduce((s, v) => s + v, 0), nNeg = y.length - nPos;
    let tp = 0, fp = 0;
    const pts = [{x:0, y:0}];
    pairs.forEach(pair => {
        if (pair.y === 1) tp++; else fp++;
        pts.push({x: fp/nNeg, y: tp/nPos});
    });
    return pts;
}
function computeAUC(pts) {
    let auc = 0;
    for (let i = 1; i < pts.length; i++)
        auc += (pts[i].x - pts[i-1].x) * (pts[i].y + pts[i-1].y) / 2;
    return auc;
}

function drawROCChart(pts, auc) {
    const ctx = document.getElementById('logROCChart')?.getContext('2d');
    if (!ctx) return;
    if (charts['roc']) { charts['roc'].destroy(); charts['roc'] = null; }
    // Thin out points for performance (max 200)
    const step = Math.max(1, Math.floor(pts.length / 200));
    const thinPts = pts.filter((_, i) => i % step === 0 || i === pts.length-1);
    charts['roc'] = new Chart(ctx, {
        type: 'scatter',
        data: {
            datasets: [
                { label: `ROC (AUC = ${auc.toFixed(3)})`, data: thinPts, backgroundColor:'rgba(102,126,234,0.6)', pointRadius:3, showLine:true, borderColor:'rgb(102,126,234)', borderWidth:2, fill:false },
                { label: 'Random', data:[{x:0,y:0},{x:1,y:1}], type:'line', borderColor:'#aaa', borderWidth:1, borderDash:[6,4], pointRadius:0, fill:false }
            ]
        },
        options: { responsive:true, maintainAspectRatio:false,
            plugins:{ title:{display:true, text:'ROC Curve'}, legend:{position:'bottom'} },
            scales:{ x:{min:0,max:1,title:{display:true,text:'1 − Specificity (FPR)'}}, y:{min:0,max:1,title:{display:true,text:'Sensitivity (TPR)'}} }
        }
    });
}

function drawCalibrationChart(y, prob) {
    const ctx = document.getElementById('logCalibChart')?.getContext('2d');
    if (!ctx) return;
    if (charts['calib']) { charts['calib'].destroy(); charts['calib'] = null; }
    // 10 equal-width bins
    const bins = 10, binData = Array.from({length:bins}, ()=>({sumP:0,sumY:0,n:0}));
    prob.forEach((p, i) => {
        const b = Math.min(Math.floor(p * bins), bins-1);
        binData[b].sumP += p; binData[b].sumY += y[i]; binData[b].n++;
    });
    const labels=[], meanPred=[], obsRate=[];
    binData.forEach((b, i) => {
        if (b.n > 0) { labels.push(`${(i/bins*100).toFixed(0)}–${((i+1)/bins*100).toFixed(0)}%`); meanPred.push(b.sumP/b.n); obsRate.push(b.sumY/b.n); }
    });
    charts['calib'] = new Chart(ctx, {
        type: 'scatter',
        data: {
            datasets: [
                { label:'Calibration', data: meanPred.map((p,i)=>({x:p,y:obsRate[i]})), backgroundColor:'rgba(72,187,120,0.7)', pointRadius:7 },
                { label:'Perfect', data:[{x:0,y:0},{x:1,y:1}], type:'line', borderColor:'#aaa', borderWidth:1, borderDash:[6,4], pointRadius:0, fill:false }
            ]
        },
        options: { responsive:true, maintainAspectRatio:false,
            plugins:{ title:{display:true, text:'Calibration Plot'}, legend:{position:'bottom'} },
            scales:{ x:{min:0,max:1,title:{display:true,text:'Mean Predicted Probability'}}, y:{min:0,max:1,title:{display:true,text:'Observed Event Rate'}} }
        }
    });
}
