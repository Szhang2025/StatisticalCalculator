<!DOCTYPE html>

<body>
<div class="container">
    <div class="header">
        <h1>📊 Complete Statistical Analysis Suite</h1>
        <p>Multi-variable analysis with accurate statistical tests</p>
        <div class="upload-section">
            <input type="file" id="fileInput" accept=".csv" style="display:none;">
            <button class="btn-primary" onclick="document.getElementById('fileInput').click()">📁 Upload CSV File</button>
            <button class="btn-success" onclick="loadSampleData()">📊 Load Sample Dataset</button>
            <button class="btn-info" onclick="exportResults()">📥 Export Results</button>
            <span id="dataStatus" style="margin-left: 15px; color: #28a745; font-weight: 600;"></span>
        </div>
        <div id="variableSummary" style="margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 8px; display: none;">
            <div class="summary-stats">
                <div class="summary-item"><div class="label">Total Rows</div><div class="number" id="rowCount">0</div></div>
                <div class="summary-item"><div class="label">Total Columns</div><div class="number" id="colCount">0</div></div>
                <div class="summary-item"><div class="label">Numeric</div><div class="number" id="numericCount">0</div></div>
                <div class="summary-item"><div class="label">Categorical</div><div class="number" id="categoricalCount">0</div></div>
            </div>
        </div>
    </div>

    <div class="tabs" id="tabs">
        <div class="tab active" onclick="switchTab(0)">📊 Descriptive</div>
        <div class="tab" onclick="switchTab(1)">🔍 One-Sample</div>
        <div class="tab" onclick="switchTab(2)">🔬 Two-Sample</div>
        <div class="tab" onclick="switchTab(3)">📐 Chi-Square</div>
        <div class="tab" onclick="switchTab(4)">📈 Regression</div>
        <div class="tab" onclick="switchTab(5)">📊 ANOVA</div>
        <div class="tab" onclick="switchTab(6)">🔗 Correlation</div>
        <div class="tab" onclick="switchTab(7)">🎯 Logistic</div>
    </div>

    <div class="panel" id="panel"></div>
</div>

<script>
// ============================================================
// GLOBAL STATE
// ============================================================
let data = [];
let headers = [];
let numericCols = [];
let categoricalCols = [];
let currentTab = 0;
let charts = {};
let lastResults = {}; // store results for export

// ============================================================
// ACCURATE STATISTICAL DISTRIBUTION FUNCTIONS
// ============================================================

// --- Regularized Incomplete Beta Function (used by t-dist and F-dist) ---
// Lentz continued fraction method
function incompleteBeta(x, a, b) {
    if (x < 0 || x > 1) return NaN;
    if (x === 0) return 0;
    if (x === 1) return 1;

    const lbeta = logGamma(a) + logGamma(b) - logGamma(a + b);
    const front = Math.exp(Math.log(x) * a + Math.log(1 - x) * b - lbeta) / a;

    // Use continued fraction via Lentz's method
    function betaCF(x, a, b) {
        const MAXIT = 200;
        const EPS = 3e-12;
        const FPMIN = 1e-300;
        const qab = a + b;
        const qap = a + 1;
        const qam = a - 1;
        let c = 1, d = 1 - qab * x / qap;
        if (Math.abs(d) < FPMIN) d = FPMIN;
        d = 1 / d;
        let h = d;
        for (let m = 1; m <= MAXIT; m++) {
            const m2 = 2 * m;
            let aa = m * (b - m) * x / ((qam + m2) * (a + m2));
            d = 1 + aa * d;
            if (Math.abs(d) < FPMIN) d = FPMIN;
            c = 1 + aa / c;
            if (Math.abs(c) < FPMIN) c = FPMIN;
            d = 1 / d;
            h *= d * c;
            aa = -(a + m) * (qab + m) * x / ((a + m2) * (qap + m2));
            d = 1 + aa * d;
            if (Math.abs(d) < FPMIN) d = FPMIN;
            c = 1 + aa / c;
            if (Math.abs(c) < FPMIN) c = FPMIN;
            d = 1 / d;
            const del = d * c;
            h *= del;
            if (Math.abs(del - 1) < EPS) break;
        }
        return h;
    }

    // Use symmetry relation for better numerical stability
    if (x < (a + 1) / (a + b + 2)) {
        return front * betaCF(x, a, b);
    } else {
        return 1 - Math.exp(Math.log(1 - x) * b + Math.log(x) * a - lbeta) / b * betaCF(1 - x, b, a);
    }
}

// Log Gamma using Lanczos approximation
function logGamma(x) {
    const g = 7;
    const c = [
        0.99999999999980993,
        676.5203681218851,
        -1259.1392167224028,
        771.32342877765313,
        -176.61502916214059,
        12.507343278686905,
        -0.13857109526572012,
        9.9843695780195716e-6,
        1.5056327351493116e-7
    ];
    if (x < 0.5) return Math.log(Math.PI / Math.sin(Math.PI * x)) - logGamma(1 - x);
    x -= 1;
    let a = c[0];
    const t = x + g + 0.5;
    for (let i = 1; i < g + 2; i++) a += c[i] / (x + i);
    return 0.5 * Math.log(2 * Math.PI) + (x + 0.5) * Math.log(t) - t + Math.log(a);
}

// Regularized incomplete gamma (upper) – for chi-square p-values
// Uses series / continued fraction depending on x
function incompleteGammaUpper(a, x) {
    if (x < 0) return 1;
    if (x === 0) return 1;
    if (x < a + 1) {
        // Series representation for lower gamma, then complement
        return 1 - incompleteGammaLowerSeries(a, x);
    } else {
        return incompleteGammaUpperCF(a, x);
    }
}

function incompleteGammaLowerSeries(a, x) {
    const MAXIT = 200;
    const EPS = 3e-12;
    if (x <= 0) return 0;
    let ap = a, sum = 1 / a, del = sum;
    for (let n = 1; n <= MAXIT; n++) {
        ap++;
        del *= x / ap;
        sum += del;
        if (Math.abs(del) < Math.abs(sum) * EPS) break;
    }
    return sum * Math.exp(-x + a * Math.log(x) - logGamma(a));
}

function incompleteGammaUpperCF(a, x) {
    const MAXIT = 200;
    const EPS = 3e-12;
    const FPMIN = 1e-300;
    let b = x + 1 - a, c = 1 / FPMIN, d = 1 / b, h = d;
    for (let i = 1; i <= MAXIT; i++) {
        const an = -i * (i - a);
        b += 2;
        d = an * d + b;
        if (Math.abs(d) < FPMIN) d = FPMIN;
        c = b + an / c;
        if (Math.abs(c) < FPMIN) c = FPMIN;
        d = 1 / d;
        const del = d * c;
        h *= del;
        if (Math.abs(del - 1) < EPS) break;
    }
    return Math.exp(-x + a * Math.log(x) - logGamma(a)) * h;
}

// --- FIX #1, #4: Accurate t-distribution CDF using incomplete beta ---
function tCDF(t, df) {
    // Returns P(T <= t) for two-tailed: we return P(T <= |t|) and caller uses 2*(1-tCDF)
    const x = df / (df + t * t);
    const p = incompleteBeta(x, df / 2, 0.5);
    // p = P(|T| >= |t|) * ... actually: incomplete beta gives us the two-tail directly
    // P(|T| > |t|) = I_x(df/2, 1/2)
    return 1 - p / 2; // return CDF (one-sided, upper)
}

// Accurate p-value for two-tailed t-test: p = 2 * P(T > |t|)
function tPValue(t, df) {
    const x = df / (df + t * t);
    return incompleteBeta(x, df / 2, 0.5);
}

// --- FIX #1, #2: Accurate t critical value via bisection ---
function tInv(p, df) {
    // Returns t such that P(T <= t) = p (one-sided)
    // Uses bisection on tCDF
    if (p <= 0) return -Infinity;
    if (p >= 1) return Infinity;
    if (p === 0.5) return 0;

    let lo = 0, hi = 100;
    for (let i = 0; i < 100; i++) {
        const mid = (lo + hi) / 2;
        if (tCDF(mid, df) < p) lo = mid;
        else hi = mid;
        if (hi - lo < 1e-9) break;
    }
    return (lo + hi) / 2;
}

// --- FIX #3: Accurate chi-square p-value using upper incomplete gamma ---
function chiSqPValue(x, df) {
    // P(chi^2 > x) = Q(df/2, x/2)
    if (x <= 0) return 1;
    return incompleteGammaUpper(df / 2, x / 2);
}

// --- FIX #3: Accurate F-distribution p-value ---
function fPValue(F, df1, df2) {
    // P(F_stat > F) using incomplete beta: I_x(df2/2, df1/2) where x = df2/(df2+df1*F)
    if (F <= 0) return 1;
    const x = df2 / (df2 + df1 * F);
    return incompleteBeta(x, df2 / 2, df1 / 2);
}

// --- Standard normal quantile (for Q-Q plots) ---
function normalQuantile(p) {
    // FIX #18: guard for boundary values
    if (p <= 0) return -8;
    if (p >= 1) return 8;
    // Rational approximation by Beasley-Springer-Moro, improved version
    const a = [0, -3.969683028665376e+01, 2.209460984245205e+02,
               -2.759285104469687e+02, 1.383577518672690e+02,
               -3.066479806614716e+01, 2.506628277459239e+00];
    const b = [0, -5.447609879822406e+01, 1.615858368580409e+02,
               -1.556989798598866e+02, 6.680131188771972e+01,
               -1.328068155288572e+01];
    const c = [0, -7.784894002430293e-03, -3.223964580411365e-01,
               -2.400758277161838e+00, -2.549732539343734e+00,
                4.374664141464968e+00, 2.938163982698783e+00];
    const d = [0,  7.784695709041462e-03, 3.224671290700398e-01,
                2.445134137142996e+00, 3.754408661907416e+00];

    const pLow = 0.02425, pHigh = 1 - pLow;
    let q, r;
    if (p < pLow) {
        q = Math.sqrt(-2 * Math.log(p));
        return (((((c[1]*q+c[2])*q+c[3])*q+c[4])*q+c[5])*q+c[6]) /
               ((((d[1]*q+d[2])*q+d[3])*q+d[4])*q+1);
    } else if (p <= pHigh) {
        q = p - 0.5;
        r = q * q;
        return (((((a[1]*r+a[2])*r+a[3])*r+a[4])*r+a[5])*r+a[6])*q /
               (((((b[1]*r+b[2])*r+b[3])*r+b[4])*r+b[5])*r+1);
    } else {
        q = Math.sqrt(-2 * Math.log(1 - p));
        return -(((((c[1]*q+c[2])*q+c[3])*q+c[4])*q+c[5])*q+c[6]) /
                ((((d[1]*q+d[2])*q+d[3])*q+d[4])*q+1);
    }
}

// ============================================================
// SAMPLE DATA GENERATION
// ============================================================
function loadSampleData() {
    data = [];
    const n = 200;
    for (let i = 0; i < n; i++) {
        const age = 18 + Math.floor(Math.random() * 60);
        const height = 150 + Math.random() * 40;
        const weight = 50 + Math.random() * 50;
        const bmi = weight / ((height / 100) ** 2);
        data.push({
            Age: age,
            Height: parseFloat(height.toFixed(2)),
            Weight: parseFloat(weight.toFixed(2)),
            BMI: parseFloat(bmi.toFixed(2)),
            Income: parseFloat((25000 + Math.random() * 75000).toFixed(2)),
            Satisfaction: 1 + Math.floor(Math.random() * 5),
            Purchases: Math.floor(Math.random() * 20),
            Returns: Math.floor(Math.random() * 5),
            Score: parseFloat((40 + Math.random() * 60).toFixed(2)),
            Gender: Math.random() > 0.5 ? 'Male' : 'Female',
            Education: ['High School', 'Bachelor', 'Master', 'PhD'][Math.floor(Math.random() * 4)],
            Region: ['North', 'South', 'East', 'West'][Math.floor(Math.random() * 4)],
            Group: ['Control', 'Treatment A', 'Treatment B'][Math.floor(Math.random() * 3)],
            Category: ['Product A', 'Product B', 'Product C'][Math.floor(Math.random() * 3)],
            Quality: ['Poor', 'Fair', 'Good', 'Excellent'][Math.floor(Math.random() * 4)],
            Month: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'][Math.floor(Math.random() * 6)]
        });
    }
    headers = Object.keys(data[0]);
    // FIX #17: ID removed from sample data (meaningless group variable)
    numericCols = ['Age', 'Height', 'Weight', 'BMI', 'Income', 'Satisfaction', 'Purchases', 'Returns', 'Score'];
    categoricalCols = ['Gender', 'Education', 'Region', 'Group', 'Category', 'Quality', 'Month'];
    updateVariableSummary();
    renderTab(currentTab);
}

// ============================================================
// FILE UPLOAD — FIX #14: Proper CSV parser (handles quoted commas)
// ============================================================
function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
            if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
            else inQuotes = !inQuotes;
        } else if (ch === ',' && !inQuotes) {
            result.push(current.trim());
            current = '';
        } else {
            current += ch;
        }
    }
    result.push(current.trim());
    return result;
}

document.getElementById('fileInput').addEventListener('change', function (e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (event) {
        const lines = event.target.result.split(/\r?\n/).filter(l => l.trim());
        headers = parseCSVLine(lines[0]);
        data = [];
        numericCols = [];
        categoricalCols = [];
        for (let i = 1; i < Math.min(lines.length, 5000); i++) {
            if (!lines[i].trim()) continue;
            const values = parseCSVLine(lines[i]);
            let row = {};
            for (let j = 0; j < headers.length; j++) {
                const val = j < values.length ? values[j] : '';
                const num = parseFloat(val);
                row[headers[j]] = isNaN(num) ? val : num;
            }
            data.push(row);
        }
        if (data.length > 0) {
            headers.forEach(h => {
                let numericCount = 0, total = 0;
                for (let i = 0; i < Math.min(50, data.length); i++) {
                    if (data[i][h] !== undefined && data[i][h] !== '') {
                        total++;
                        if (typeof data[i][h] === 'number' && !isNaN(data[i][h])) numericCount++;
                    }
                }
                if (numericCount > total * 0.8) numericCols.push(h);
                else categoricalCols.push(h);
            });
        }
        updateVariableSummary();
        renderTab(currentTab);
    };
    reader.readAsText(file);
});

function updateVariableSummary() {
    document.getElementById('dataStatus').innerHTML = `✅ ${data.length} rows loaded`;
    document.getElementById('rowCount').textContent = data.length;
    document.getElementById('colCount').textContent = headers.length;
    document.getElementById('numericCount').textContent = numericCols.length;
    document.getElementById('categoricalCount').textContent = categoricalCols.length;
    document.getElementById('variableSummary').style.display = 'block';
}

function updateDescriptive() {

            // FIX #5: Correct median for even n

            const q1 = vals[Math.floor(n * 0.25)];
            const q3 = vals[Math.floor(n * 0.75)];
            const sd = Math.sqrt(vals.reduce((s, v) => s + (v - mean) ** 2, 0) / (n - 1));
            const skew = vals.reduce((s, v) => s + ((v - mean) / sd) ** 3, 0) / n;
            html = `<div class="stat-card"><h3>${sel} (Numeric)</h3>
                <div class="stat-row"><span class="stat-label">n:</span><span class="stat-value">${n}</span></div>

                <div class="stat-row"><span class="stat-label">Q1:</span><span class="stat-value">${q1.toFixed(3)}</span></div>
                <div class="stat-row"><span class="stat-label">Q3:</span><span class="stat-value">${q3.toFixed(3)}</span></div>
                <div class="stat-row"><span class="stat-label">IQR:</span><span class="stat-value">${(q3 - q1).toFixed(3)}</span></div>
                <div class="stat-row"><span class="stat-label">Min:</span><span class="stat-value">${vals[0].toFixed(3)}</span></div>
                <div class="stat-row"><span class="stat-label">Max:</span><span class="stat-value">${vals[n - 1].toFixed(3)}</span></div>
                <div class="stat-row"><span class="stat-label">Skewness:</span><span class="stat-value">${skew.toFixed(3)}</span></div>
            </div>`;
            drawHistogram(sel, vals);
        }
    } else {
        const freq = {};
        data.forEach(d => { const v = d[sel]; if (v !== undefined && v !== '') freq[v] = (freq[v] || 0) + 1; });
        const cats = Object.keys(freq).sort();
        const total = cats.reduce((s, c) => s + freq[c], 0);

}

function drawHistogram(varName, vals) {
    const canvas = document.getElementById('descChart');
    if (!canvas) return;
    if (charts['desc']) { charts['desc'].destroy(); charts['desc'] = null; }
    const bins = 20;
    const min = vals[0], max = vals[vals.length - 1];
    if (min === max) return;
    const bw = (max - min) / bins;
    const counts = Array(bins).fill(0);
    const labels = [];
    for (let i = 0; i < bins; i++) labels.push((min + i * bw + bw / 2).toFixed(1));
    vals.forEach(v => {
        let idx = Math.floor((v - min) / bw);
        if (idx >= bins) idx = bins - 1;
        counts[idx]++;
    });
    charts['desc'] = new Chart(canvas.getContext('2d'), {
        type: 'bar',
        data: { labels, datasets: [{ label: varName, data: counts, backgroundColor: 'rgba(102,126,234,0.7)', borderColor: 'rgb(102,126,234)', borderWidth: 1 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: `Histogram of ${varName}` } }, scales: { y: { beginAtZero: true, title: { display: true, text: 'Frequency' } } } }
    });
}

function drawBarChart(varName, freq) {
    const canvas = document.getElementById('descChart');
    if (!canvas) return;
    if (charts['desc']) { charts['desc'].destroy(); charts['desc'] = null; }
    const cats = Object.keys(freq).sort();
    charts['desc'] = new Chart(canvas.getContext('2d'), {
        type: 'bar',
        data: { labels: cats, datasets: [{ label: 'Frequency', data: cats.map(c => freq[c]), backgroundColor: 'rgba(102,126,234,0.7)', borderColor: 'rgb(102,126,234)', borderWidth: 2 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: `Frequency Distribution: ${varName}` } }, scales: { y: { beginAtZero: true, title: { display: true, text: 'Count' } } } }
    });
}

// 2. ONE-SAMPLE t-TEST — FIX #2: CI uses correct critical value
// ============================================================
function renderOneSample() {
    return `
        <h2>🔍 One-Sample t-Tests</h2>
        <div class="control-panel">
            <h3>Select Variables:</h3>
            <div class="variable-grid">${numericCols.map(col => numericCheckboxItem(col, 'one')).join('')}</div>
            <div class="control-row">
                <div class="control-group">
                    <label>Null (μ₀):</label>
                    <input type="number" id="oneNull" value="0" step="any" onchange="updateOneSample()">
                </div>
                <div class="control-group">
                    <label>Confidence:</label>
                    <select id="oneConf" onchange="updateOneSample()">
                        <option value="0.90">90%</option>
                        <option value="0.95" selected>95%</option>
                        <option value="0.99">99%</option>
                    </select>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn-primary" onclick="selectAll('one', numericCols)">Select All</button>
                <button class="btn-warning" onclick="clearAll('one')">Clear All</button>
            </div>
        </div>
        <div id="oneResults" class="results-table-container"></div>
        <div class="interpretation-box" id="oneInterpretation"></div>`;
}

function initOneSample() { updateOneSample(); }

function updateOneSample() {
    const selected = getSelectedCheckboxes('one');
    const nullVal = parseFloat(document.getElementById('oneNull').value);
    const conf = parseFloat(document.getElementById('oneConf').value);
    if (selected.length === 0) return;

    const alpha = 1 - conf;
    let rows = '', sig = 0;
    const results = [];

    selected.forEach(v => {
        const vals = data.map(d => d[v]).filter(x => typeof x === 'number' && !isNaN(x));
        if (vals.length < 2) return;
        const n = vals.length;
        const mean = vals.reduce((a, b) => a + b, 0) / n;
        const sd = Math.sqrt(vals.reduce((s, x) => s + (x - mean) ** 2, 0) / (n - 1));
        const se = sd / Math.sqrt(n);
        const t = (mean - nullVal) / se;
        const df = n - 1;
        const p = tPValue(t, df); // FIX #1: accurate p-value
        // FIX #2: tInv with actual alpha/2 and df
        const tCrit = tInv(1 - alpha / 2, df);
        const ci = [mean - tCrit * se, mean + tCrit * se];
        const isSig = p < alpha;
        if (isSig) sig++;
        results.push({ v, mean: mean.toFixed(3), sd: sd.toFixed(3), se: se.toFixed(3), t: t.toFixed(3), df, p, ci, isSig });
        rows += `<tr>
            <td><strong>${v}</strong></td><td>${n}</td><td>${mean.toFixed(3)}</td><td>${sd.toFixed(3)}</td>
            <td>${se.toFixed(3)}</td><td>${t.toFixed(3)}</td><td>${df}</td><td>${fmtP(p)}</td>
            <td>[${ci[0].toFixed(3)}, ${ci[1].toFixed(3)}]</td>
            <td><span class="status-badge ${isSig ? 'status-significant' : 'status-not-significant'}">${isSig ? '✓' : '✗'}</span></td>
        </tr>`;
    });

    lastResults = Object.fromEntries(results.map(r => [`One-sample t (${r.v})`, `t=${r.t}, df=${r.df}, p=${fmtP(r.p)}`]));

    document.getElementById('oneResults').innerHTML = `
        <table class="results-table">
            <tr><th>Variable</th><th>n</th><th>Mean</th><th>SD</th><th>SE</th><th>t</th><th>df</th><th>p-value</th><th>${(conf * 100).toFixed(0)}% CI</th><th>Sig.</th></tr>
            ${rows}
        </table>`;
    document.getElementById('oneInterpretation').innerHTML =
        `<strong>Interpretation:</strong> ${sig} of ${selected.length} variable(s) differ significantly from μ₀ = ${nullVal} at α = ${alpha}.`;
}

// 3. TWO-SAMPLE t-TEST — FIX #6: Welch df + FIX #1 accurate p
// ============================================================
function renderTwoSample() {
    return `
        <h2>🔬 Two-Sample t-Tests (Welch)</h2>
        <div class="control-panel">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div>
                    <h3>Numeric Variables:</h3>
                    <div class="variable-grid">${numericCols.map(col => numericCheckboxItem(col, 'twoNum')).join('')}</div>
                </div>
                <div>
                    <h3>Grouping Variable (2 groups):</h3>
                    <div class="variable-grid">${categoricalCols.map(col => catRadioItem(col, 'twoGroup')).join('')}</div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn-primary" onclick="selectAll('twoNum', numericCols)">Select All Numeric</button>
                <button class="btn-warning" onclick="clearAll('twoNum')">Clear Numeric</button>
            </div>
        </div>
        <div id="twoResults" class="results-table-container"></div>
        <div class="interpretation-box" id="twoInterpretation"></div>`;
}

function initTwoSample() { updateTwoSample(); }

function updateTwoSample() {
    const selNum = getSelectedCheckboxes('twoNum');
    const selGroup = getSelectedRadio('twoGroup');
    if (!selNum.length || !selGroup) return;

    const groups = [...new Set(data.map(d => d[selGroup]).filter(g => g !== undefined && g !== ''))];
    if (groups.length !== 2) {
        document.getElementById('twoResults').innerHTML = `<div class="warning-box">⚠️ Grouping variable must have exactly 2 groups. Found: ${groups.length} (${groups.join(', ')})</div>`;
        return;
    }

    const [g1, g2] = groups;
    let rows = '', sig = 0;

    selNum.forEach(v => {
        const v1 = data.filter(d => d[selGroup] === g1).map(d => d[v]).filter(x => typeof x === 'number' && !isNaN(x));
        const v2 = data.filter(d => d[selGroup] === g2).map(d => d[v]).filter(x => typeof x === 'number' && !isNaN(x));
        if (v1.length < 2 || v2.length < 2) return;
        const n1 = v1.length, n2 = v2.length;
        const m1 = v1.reduce((a, b) => a + b, 0) / n1;
        const m2 = v2.reduce((a, b) => a + b, 0) / n2;
        const s1 = v1.reduce((s, x) => s + (x - m1) ** 2, 0) / (n1 - 1);
        const s2 = v2.reduce((s, x) => s + (x - m2) ** 2, 0) / (n2 - 1);
        const se = Math.sqrt(s1 / n1 + s2 / n2);
        const t = (m1 - m2) / se;
        // FIX #6: Welch-Satterthwaite df
        const df = (s1 / n1 + s2 / n2) ** 2 / ((s1 / n1) ** 2 / (n1 - 1) + (s2 / n2) ** 2 / (n2 - 1));
        const p = tPValue(t, df);
        const isSig = p < 0.05;
        if (isSig) sig++;
        rows += `<tr>
            <td><strong>${v}</strong></td>
            <td>n=${n1}, μ=${m1.toFixed(2)}, SD=${Math.sqrt(s1).toFixed(2)}</td>
            <td>n=${n2}, μ=${m2.toFixed(2)}, SD=${Math.sqrt(s2).toFixed(2)}</td>
            <td>${(m1 - m2).toFixed(3)}</td><td>${t.toFixed(3)}</td><td>${df.toFixed(1)}</td><td>${fmtP(p)}</td>
            <td><span class="status-badge ${isSig ? 'status-significant' : 'status-not-significant'}">${isSig ? '✓' : '✗'}</span></td>
        </tr>`;
    });

    document.getElementById('twoResults').innerHTML = `
        <h3>Comparing "${g1}" vs "${g2}"</h3>
        <table class="results-table">
            <tr><th>Variable</th><th>${g1}</th><th>${g2}</th><th>Difference</th><th>t</th><th>df (Welch)</th><th>p-value</th><th>Sig.</th></tr>
            ${rows}
        </table>`;
    document.getElementById('twoInterpretation').innerHTML =
        `<strong>Interpretation:</strong> ${sig} of ${selNum.length} variable(s) differ significantly between groups at α = 0.05 (Welch's t-test).`;
}

// ============================================================
// 4. CHI-SQUARE GOF — FIX #3, #8, #9
// ============================================================
let currentChiVar = null;
let proportionValues = {};

function renderChiSquare() {
    return `
        <h2>📐 Chi-Square Goodness of Fit</h2>
        <div class="control-panel">
            <h3>Select Categorical Variable:</h3>
            <div class="variable-grid">${categoricalCols.map(col => catRadioItem(col, 'chiVar')).join('')}</div>
            <div class="expected-proportions" id="proportionsContainer" style="display:none;">
                <h4>Expected Proportions (must sum to 1)</h4>
                <div id="proportionInputs"></div>
                <button class="equal-proportions-btn" onclick="setEqualProportions()">Set Equal Proportions</button>
                <span id="propSumWarning" style="margin-left:10px;color:#e53e3e;font-weight:600;"></span>
            </div>
        </div>
        <div id="chiResults" class="results-table-container"></div>
        <div class="interpretation-box" id="chiInterpretation"></div>`;
}

function initChiSquare() { updateChiSquare(); }

function setEqualProportions() {
    if (!currentChiVar) return;
    const cats = [...new Set(data.map(d => d[currentChiVar]).filter(v => v !== undefined && v !== ''))].sort();
    const eq = 1 / cats.length;
    // FIX #8: reset proportionValues entirely when setting equal
    proportionValues = {};
    cats.forEach(c => {
        proportionValues[c] = eq;
        const inp = document.getElementById(`prop_${CSS.escape(c)}`);
        if (inp) inp.value = eq.toFixed(4);
    });
    runChiSquare(currentChiVar);
}

function updateChiSquare() {
    const sel = getSelectedRadio('chiVar');
    if (!sel) {
        document.getElementById('chiResults').innerHTML = '';
        document.getElementById('chiInterpretation').innerHTML = '';
        document.getElementById('proportionsContainer').style.display = 'none';
        return;
    }
    // FIX #8: reset proportionValues when variable changes
    if (sel !== currentChiVar) {
        currentChiVar = sel;
        proportionValues = {};
    }
    const cats = [...new Set(data.map(d => d[sel]).filter(v => v !== undefined && v !== ''))].sort();
    document.getElementById('proportionsContainer').style.display = 'block';
    let html = '';
    cats.forEach(c => {
        const safeId = `prop_${c.replace(/[^a-zA-Z0-9]/g, '_')}`;
        if (!(c in proportionValues)) proportionValues[c] = (1 / cats.length);
        html += `<div class="proportion-input">
            <label>${c}:</label>
            <input type="number" id="${safeId}" value="${proportionValues[c].toFixed(4)}" min="0" max="1" step="0.001"
                   onchange="proportionValues['${c}']=parseFloat(this.value)||0;runChiSquare('${sel}')">
        </div>`;
    });
    document.getElementById('proportionInputs').innerHTML = html;
    runChiSquare(sel);
}

function runChiSquare(varName) {
    const cats = [...new Set(data.map(d => d[varName]).filter(v => v !== undefined && v !== ''))].sort();
    const obs = {};
    cats.forEach(c => obs[c] = 0);
    data.forEach(d => { if (d[varName] in obs) obs[d[varName]]++; });
    const total = cats.reduce((s, c) => s + obs[c], 0);

    const props = cats.map(c => proportionValues[c] || 0);
    const propSum = props.reduce((a, b) => a + b, 0);

    // Warn if proportions don't sum to 1
    const sumWarn = document.getElementById('propSumWarning');
    if (Math.abs(propSum - 1) > 0.001) {
        sumWarn.textContent = `⚠ Proportions sum to ${propSum.toFixed(4)} — will be normalized.`;
    } else {
        sumWarn.textContent = '';
    }

    const normProps = props.map(p => p / propSum);
    const expected = normProps.map(p => p * total);

    // Check expected cell size assumption
    const smallCells = expected.filter(e => e < 5).length;

    let chiSq = 0;
    let rows = '';
    cats.forEach((c, i) => {
        const o = obs[c], e = expected[i];
        const contrib = (o - e) ** 2 / e;
        chiSq += contrib;
        rows += `<tr><td>${c}</td><td>${o}</td><td>${e.toFixed(2)}</td><td>${normProps[i].toFixed(4)}</td><td>${contrib.toFixed(3)}</td></tr>`;
    });

    const df = cats.length - 1;
    // FIX #3: Accurate chi-square p-value
    const p = chiSqPValue(chiSq, df);

    // FIX #9: note about df if parameters estimated
    const dfNote = `df = k − 1 = ${cats.length} − 1 = ${df}. If distribution parameters were estimated from the data, df should be reduced accordingly.`;

    lastResults['Chi-Square GOF'] = `χ²=${chiSq.toFixed(3)}, df=${df}, p=${fmtP(p)}`;

    document.getElementById('chiResults').innerHTML = `
        <h3>Chi-Square GOF: ${varName}</h3>
        ${smallCells > 0 ? `<div class="warning-box">⚠️ ${smallCells} cell(s) have expected frequency < 5. Chi-square approximation may be unreliable.</div>` : ''}
        <table class="results-table">
            <tr><th>Category</th><th>Observed</th><th>Expected</th><th>Expected Prop.</th><th>(O−E)²/E</th></tr>
            ${rows}
            <tr style="font-weight:bold;background:#f8f9fa"><td colspan="4">χ² Statistic</td><td>${chiSq.toFixed(3)}</td></tr>
        </table>`;
    document.getElementById('chiInterpretation').innerHTML = `
        <strong>χ² = ${chiSq.toFixed(3)}, df = ${df}, p = ${fmtP(p)}</strong><br>
        ${p < 0.05 ? '✓ Significant: observed frequencies differ from expected proportions (p < 0.05).' : '✗ Not significant: no evidence against expected proportions (p ≥ 0.05).'}<br>
        <small>${dfNote}</small>`;
}

// ── Design matrix builder ─────────────────────────────────────
// xVars   : array of original variable names (main effects)
// ixPairs : array of [a,b] pairs for interactions
// validData: filtered rows
// Returns { specs, ixSpecs, getRow, k }
function buildDesignMatrix(xVars, ixPairs, validData) {
    // ── Main-effect specs ──
    const specs = xVars.map(v => {
        if (categoricalCols.includes(v)) {
            const levels = [...new Set(validData.map(d => String(d[v])))].sort();
            return { v, type: 'cat', reference: levels[0], dummies: levels.slice(1) };
        }
        return { v, type: 'num' };
    });

    // ── Interaction specs ──
    // For each pair we build sub-columns just like the main effects do, then combine.
    const ixSpecs = ixPairs.map(([a, b]) => {
        const sa = specs.find(s => s.v === a);
        const sb = specs.find(s => s.v === b);
        const typeA = sa ? sa.type : 'num';
        const typeB = sb ? sb.type : 'num';

        if (typeA === 'num' && typeB === 'num') {
            // single product column
            return { a, b, kind: 'num×num', cols: [`${a}×${b}`] };
        } else if (typeA === 'num' && typeB === 'cat') {
            const cols = sb.dummies.map(d => `${a}×(${b}=${d})`);
            return { a, b, kind: 'num×cat', refB: sb.reference, dummiesB: sb.dummies, cols };
        } else if (typeA === 'cat' && typeB === 'num') {
            const cols = sa.dummies.map(d => `(${a}=${d})×${b}`);
            return { a, b, kind: 'cat×num', refA: sa.reference, dummiesA: sa.dummies, cols };
        } else {
            // cat×cat: all non-reference pair dummies
            const cols = [];
            sa.dummies.forEach(da => sb.dummies.forEach(db => cols.push(`(${a}=${da})×(${b}=${db})`)));
            return { a, b, kind: 'cat×cat', sa, sb, cols };
        }
    });

    // ── Total k (without intercept) ──
    const mainCols  = specs.reduce((s, sp) => s + (sp.type === 'num' ? 1 : sp.dummies.length), 0);
    const ixCols    = ixSpecs.reduce((s, ix) => s + ix.cols.length, 0);
    const k         = mainCols + ixCols;

    // ── Row builder ──
    function getRow(row) {
        const vals = [];
        // main effects
        specs.forEach(s => {
            if (s.type === 'num') {
                vals.push(row[s.v]);
            } else {
                const lv = String(row[s.v]);
                s.dummies.forEach(d => vals.push(lv === d ? 1 : 0));
            }
        });
        // interactions
        ixSpecs.forEach(ix => {
            const va = row[ix.a], vb = row[ix.b];
            if (ix.kind === 'num×num') {
                vals.push(va * vb);
            } else if (ix.kind === 'num×cat') {
                const lv = String(vb);
                ix.dummiesB.forEach(d => vals.push(va * (lv === d ? 1 : 0)));
            } else if (ix.kind === 'cat×num') {
                const lv = String(va);
                ix.dummiesA.forEach(d => vals.push((lv === d ? 1 : 0) * vb));
            } else {
                // cat×cat
                const lva = String(va), lvb = String(vb);
                ix.sa.dummies.forEach(da =>
                    ix.sb.dummies.forEach(db =>
                        vals.push((lva === da ? 1 : 0) * (lvb === db ? 1 : 0))));
            }
        });
        return vals;
    }

    return { specs, ixSpecs, getRow, k };
}

// ── Core OLS fitter ──────────────────────────────────────────
// Returns { coeffs, se, tStats, pVals, rsq, adjRsq, aic, ssRes, predicted, residuals }
// or throws on singular matrix.
function fitOLS(Xrows, y) {
    const n = y.length;
    const p = Xrows[0].length; // includes intercept
    const Xm  = math.matrix(Xrows);
    const ym  = math.matrix(y.map(v => [v]));
    const Xt  = math.transpose(Xm);
    const XtX = math.multiply(Xt, Xm);
    const inv = math.inv(XtX);
    const beta= math.multiply(math.multiply(inv, Xt), ym);
    const coeffs = Array.from({length: p}, (_, i) => beta.get([i, 0]));

    const predicted = Xrows.map(row => row.reduce((s, xi, j) => s + xi * coeffs[j], 0));
    const yMean = y.reduce((a,b) => a+b, 0) / n;
    const residuals = y.map((yi, i) => yi - predicted[i]);
    const ssRes  = residuals.reduce((s, r) => s + r*r, 0);
    const ssTot  = y.reduce((s, yi) => s + (yi-yMean)**2, 0);
    const k      = p - 1; // predictors excluding intercept
    const rsq    = ssTot > 0 ? 1 - ssRes/ssTot : 0;
    const adjRsq = 1 - (1-rsq)*(n-1)/(n-k-1);
    const mse    = ssRes / (n-k-1);
    const invArr = inv.valueOf();
    const se     = Array.from({length: p}, (_, i) => Math.sqrt(Math.max(0, mse * invArr[i][i])));
    const tStats = coeffs.map((b, i) => se[i] > 0 ? b/se[i] : 0);
    const pVals  = tStats.map(t => tPValue(t, n-k-1));
    const aic    = n * Math.log(ssRes/n) + 2*p;
    return { coeffs, se, tStats, pVals, rsq, adjRsq, aic, ssRes, predicted, residuals, k, n };
}

// ── AIC-based variable selection ─────────────────────────────
// candidateKeys : string[] — each key is either a plain varName or "A|||B" for interaction
// Returns the final selected key array.
function aicSelect(mode, candidateKeys, yArr, validData, specs, ixSpecs) {

    // helper: build Xrows for a given subset of candidate keys
    function buildX(keys) {
        // separate main-effect keys from interaction keys
        const mainKeys = keys.filter(k => !k.includes('|||'));
        const ixKeys   = keys.filter(k =>  k.includes('|||')).map(k => k.split('|||'));
        // re-slice specs/ixSpecs to only the requested ones
        const selSpecs  = mainKeys.map(k => specs.find(s => s.v === k)).filter(Boolean);
        const selIxSpec = ixKeys.map(([a,b]) => ixSpecs.find(ix => ix.a===a && ix.b===b)).filter(Boolean);

        function rowFn(row) {
            const vals = [];
            selSpecs.forEach(s => {
                if (s.type === 'num') { vals.push(row[s.v]); }
                else { const lv=String(row[s.v]); s.dummies.forEach(d=>vals.push(lv===d?1:0)); }
            });
            selIxSpec.forEach(ix => {
                const va=row[ix.a], vb=row[ix.b];
                if (ix.kind==='num×num') { vals.push(va*vb); }
                else if (ix.kind==='num×cat') { const lv=String(vb); ix.dummiesB.forEach(d=>vals.push(va*(lv===d?1:0))); }
                else if (ix.kind==='cat×num') { const lv=String(va); ix.dummiesA.forEach(d=>vals.push((lv===d?1:0)*vb)); }
                else { const lva=String(va),lvb=String(vb); ix.sa.dummies.forEach(da=>ix.sb.dummies.forEach(db=>vals.push((lva===da?1:0)*(lvb===db?1:0)))); }
            });
            return vals;
        }
        return validData.map(row => [1, ...rowFn(row)]);
    }

    function aic(keys) {
        if (keys.length === 0) {
            // intercept-only
            const n = yArr.length, yMean = yArr.reduce((a,b)=>a+b,0)/n;
            const ssRes = yArr.reduce((s,y)=>s+(y-yMean)**2,0);
            return n * Math.log(ssRes/n) + 2;
        }
        try {
            const Xrows = buildX(keys);
            return fitOLS(Xrows, yArr).aic;
        } catch { return Infinity; }
    }

    let current = [];
    const log = [];

    if (mode === 'backward') {
        current = [...candidateKeys];
        let curAic = aic(current);
        log.push(`Start: all ${current.length} candidates, AIC = ${curAic.toFixed(2)}`);
        let improved = true;
        while (improved && current.length > 0) {
            improved = false;
            let bestAic = curAic, bestDrop = null;
            current.forEach(key => {
                const subset = current.filter(k => k !== key);
                const a = aic(subset);
                if (a < bestAic) { bestAic = a; bestDrop = key; }
            });
            if (bestDrop !== null) {
                current = current.filter(k => k !== bestDrop);
                curAic = bestAic;
                log.push(`− Remove "${bestDrop.replace('|||',' × ')}" → AIC = ${curAic.toFixed(2)}`);
                improved = true;
            }
        }
    } else if (mode === 'forward') {
        current = [];
        let curAic = aic([]);
        const remaining = [...candidateKeys];
        log.push(`Start: intercept only, AIC = ${curAic.toFixed(2)}`);
        let improved = true;
        while (improved && remaining.length > 0) {
            improved = false;
            let bestAic = curAic, bestAdd = null;
            remaining.forEach(key => {
                const a = aic([...current, key]);
                if (a < bestAic) { bestAic = a; bestAdd = key; }
            });
            if (bestAdd !== null) {
                current.push(bestAdd);
                remaining.splice(remaining.indexOf(bestAdd), 1);
                curAic = bestAic;
                log.push(`+ Add "${bestAdd.replace('|||',' × ')}" → AIC = ${curAic.toFixed(2)}`);
                improved = true;
            }
        }
    } else { // stepwise
        current = [];
        let curAic = aic([]);
        const pool = [...candidateKeys];
        log.push(`Start: intercept only, AIC = ${curAic.toFixed(2)}`);
        let improved = true;
        while (improved) {
            improved = false;
            // try adding
            let bestAic = curAic, bestAdd = null;
            pool.filter(k => !current.includes(k)).forEach(key => {
                const a = aic([...current, key]);
                if (a < bestAic) { bestAic = a; bestAdd = key; }
            });
            if (bestAdd !== null) {
                current.push(bestAdd);
                curAic = bestAic;
                log.push(`+ Add "${bestAdd.replace('|||',' × ')}" → AIC = ${curAic.toFixed(2)}`);
                improved = true;
            }
            // try removing
            let bestDrop = null; bestAic = curAic;
            current.forEach(key => {
                const a = aic(current.filter(k => k !== key));
                if (a < bestAic) { bestAic = a; bestDrop = key; }
            });
            if (bestDrop !== null) {
                current = current.filter(k => k !== bestDrop);
                curAic = bestAic;
                log.push(`− Remove "${bestDrop.replace('|||',' × ')}" → AIC = ${curAic.toFixed(2)}`);
                improved = true;
            }
        }
    }

    log.push(`Final model: ${current.length} term(s), AIC = ${aic(current).toFixed(2)}`);
    return { selected: current, log };
}

// ── Main update function ──────────────────────────────────────
function updateRegression() {
    const yVar   = getSelectedRadio('regY');
    let   xVars  = getSelectedCheckboxes('regX').filter(x => x !== yVar);
    const ixKeys = getSelectedCheckboxes('regIx'); // "A|||B"
    const mode   = getSelectedRadio('regSelMode') || 'manual';

    const res = document.getElementById('regResults');
    if (!yVar)         { res.innerHTML = '<p style="text-align:center;padding:20px">Select a response variable (Y)</p>'; return; }
    if (!xVars.length) { res.innerHTML = '<p style="text-align:center;padding:20px">Select at least one predictor (X)</p>'; return; }

    // All candidate variable names (for filtering complete cases)
    const allOrigVars = [...new Set([...xVars, ...ixKeys.flatMap(k => k.split('|||'))])];

    const validData = data.filter(d => {
        if (typeof d[yVar] !== 'number' || isNaN(d[yVar])) return false;
        return allOrigVars.every(x => {
            const v = d[x];
            if (v === undefined || v === null || v === '') return false;
            if (numericCols.includes(x)) return typeof v === 'number' && !isNaN(v);
            return true;
        });
    });

    const n = validData.length;
    if (n < 3) { res.innerHTML = `<div class="warning-box">Not enough complete cases (${n}).</div>`; return; }

    // Build full design-matrix helpers (specs needed for selection too)
    const ixPairs = ixKeys.map(k => k.split('|||'));
    const { specs, ixSpecs, getRow, k: kFull } = buildDesignMatrix(xVars, ixPairs, validData);

    if (n < kFull + 2) {
        res.innerHTML = `<div class="warning-box">Not enough complete cases (${n}) for ${kFull} expanded predictors. Need ≥ ${kFull + 2}.</div>`;
        return;
    }

    res.innerHTML = '<p style="padding:20px;text-align:center">⏳ Computing…</p>';

    setTimeout(() => {
        try {
            const y = validData.map(d => d[yVar]);

            // ── Variable selection if requested ──────────────
            let activeXVars  = xVars;
            let activeIxKeys = ixKeys;
            let selLog = [];

            if (mode !== 'manual') {
                // candidate pool: each main-effect var as key + each ix pair as "A|||B"
                const candidates = [...xVars, ...ixKeys];
                const { selected, log } = aicSelect(mode, candidates, y, validData, specs, ixSpecs);
                selLog = log;
                activeXVars  = selected.filter(k => !k.includes('|||'));
                activeIxKeys = selected.filter(k =>  k.includes('|||'));

                if (activeXVars.length === 0 && activeIxKeys.length === 0) {
                    document.getElementById('regSelLog').innerHTML =
                        `<div class="warning-box"><strong>${mode} selection log:</strong><br>${log.join('<br>')}<br><em>No predictors improved AIC — intercept-only model.</em></div>`;
                    res.innerHTML = '';
                    document.getElementById('regWarnings').innerHTML = '';
                    document.getElementById('regInterpretation').innerHTML = '';
                    return;
                }
            }

            // ── Build final design matrix ─────────────────────
            const finalIxPairs = activeIxKeys.map(k => k.split('|||'));
            const { specs: fSpecs, ixSpecs: fIxSpecs, getRow: fGetRow, k } =
                buildDesignMatrix(activeXVars, finalIxPairs, validData);
            const Xrows = validData.map(row => [1, ...fGetRow(row)]);

            const fit = fitOLS(Xrows, y);
            const { coeffs, se, tStats, pVals, rsq, adjRsq, aic: aicVal, ssRes, predicted, residuals } = fit;

            const fStat = k > 0 ? ((rsq / k) / ((1 - rsq) / (n - k - 1))) : 0;
            const fP    = fPValue(fStat, k, n - k - 1);

            // ── Multicollinearity warning (numeric mains only) ──
            const numXv = activeXVars.filter(x => numericCols.includes(x));
            let vifWarn = '';
            if (numXv.length > 1) {
                const hi = [];
                for (let a = 0; a < numXv.length; a++) for (let b = a+1; b < numXv.length; b++) {
                    const xa = validData.map(d=>d[numXv[a]]), xb = validData.map(d=>d[numXv[b]]);
                    const ma = xa.reduce((s,v)=>s+v,0)/n, mb = xb.reduce((s,v)=>s+v,0)/n;
                    let saa=0,sbb=0,sab=0;
                    for (let i=0;i<n;i++){saa+=(xa[i]-ma)**2;sbb+=(xb[i]-mb)**2;sab+=(xa[i]-ma)*(xb[i]-mb);}
                    const r = sab/Math.sqrt(saa*sbb);
                    if (Math.abs(r)>0.8) hi.push(`${numXv[a]} & ${numXv[b]} (r=${r.toFixed(2)})`);
                }
                if (hi.length) vifWarn = `<div class="multicollinearity-warning">⚠️ High multicollinearity: ${hi.join('; ')}.</div>`;
            }

            // ── Build results table ───────────────────────────
            let rows = `<tr style="background:#fafafa">
                <td><em>(Intercept)</em></td>
                <td>${coeffs[0].toFixed(4)}</td><td>${se[0].toFixed(4)}</td>
                <td>${tStats[0].toFixed(3)}</td><td>${fmtP(pVals[0])}</td>
                <td><span class="status-badge ${pVals[0]<0.05?'status-significant':'status-not-significant'}">${pVals[0]<0.05?'✓':'✗'}</span></td>
            </tr>`;

            let ci = 1;

            // Main effects
            fSpecs.forEach(s => {
                if (s.type === 'num') {
                    const sig = pVals[ci] < 0.05;
                    rows += `<tr><td>${s.v}</td>
                        <td>${coeffs[ci].toFixed(4)}</td><td>${se[ci].toFixed(4)}</td>
                        <td>${tStats[ci].toFixed(3)}</td><td>${fmtP(pVals[ci])}</td>
                        <td><span class="status-badge ${sig?'status-significant':'status-not-significant'}">${sig?'✓':'✗'}</span></td></tr>`;
                    ci++;
                } else {
                    rows += `<tr style="background:#f0f4ff"><td colspan="6" style="font-weight:600;color:#4a5568;padding:6px 12px;">
                        📋 ${s.v} <small style="font-weight:normal">(ref: <em>${s.reference}</em>)</small></td></tr>`;
                    s.dummies.forEach(d => {
                        const sig = pVals[ci] < 0.05;
                        rows += `<tr><td style="padding-left:24px">${s.v} = ${d}</td>
                            <td>${coeffs[ci].toFixed(4)}</td><td>${se[ci].toFixed(4)}</td>
                            <td>${tStats[ci].toFixed(3)}</td><td>${fmtP(pVals[ci])}</td>
                            <td><span class="status-badge ${sig?'status-significant':'status-not-significant'}">${sig?'✓':'✗'}</span></td></tr>`;
                        ci++;
                    });
                }
            });

            // Interaction effects
            if (fIxSpecs.length > 0) {
                rows += `<tr style="background:#f5f0ff"><td colspan="6" style="font-weight:700;color:#6b46c1;padding:8px 12px;">
                    🔀 Interaction Terms</td></tr>`;
                fIxSpecs.forEach(ix => {
                    ix.cols.forEach(colName => {
                        const sig = pVals[ci] < 0.05;
                        rows += `<tr><td style="padding-left:24px">${colName}</td>
                            <td>${coeffs[ci].toFixed(4)}</td><td>${se[ci].toFixed(4)}</td>
                            <td>${tStats[ci].toFixed(3)}</td><td>${fmtP(pVals[ci])}</td>
                            <td><span class="status-badge ${sig?'status-significant':'status-not-significant'}">${sig?'✓':'✗'}</span></td></tr>`;
                        ci++;
                    });
                });
            }

            const formulaTerms = [
                ...fSpecs.map(s => s.type==='num' ? s.v : `${s.v}(${s.dummies.length})`),
                ...fIxSpecs.map(ix => `${ix.a}×${ix.b}`)
            ];

            lastResults['Regression'] = `R²=${(rsq*100).toFixed(1)}%, AIC=${aicVal.toFixed(1)}, F(${k},${n-k-1})=${fStat.toFixed(2)}, p=${fmtP(fP)}`;

            // Selection log display
            document.getElementById('regSelLog').innerHTML = selLog.length
                ? `<div style="background:#fefcbf;border-left:4px solid #d69e2e;padding:12px 16px;border-radius:6px;margin:10px 0;font-size:0.85em;">
                    <strong>📋 ${mode.charAt(0).toUpperCase()+mode.slice(1)} Selection Log:</strong><br>${selLog.join('<br>')}
                   </div>` : '';

            document.getElementById('regWarnings').innerHTML = vifWarn;
            res.innerHTML = `
                <h3>${yVar} ~ ${formulaTerms.join(' + ')}</h3>
                <table class="results-table">
                    <tr><th>Term</th><th>Coefficient</th><th>Std. Error</th><th>t-value</th><th>p-value</th><th>Sig.</th></tr>
                    ${rows}
                    <tr style="background:#f8f9fa;font-weight:bold"><td colspan="6">
                        R² = ${(rsq*100).toFixed(2)}% &nbsp;|&nbsp;
                        Adj. R² = ${(adjRsq*100).toFixed(2)}% &nbsp;|&nbsp;
                        AIC = ${aicVal.toFixed(2)} &nbsp;|&nbsp;
                        F(${k}, ${n-k-1}) = ${fStat.toFixed(3)}, p = ${fmtP(fP)} &nbsp;|&nbsp;
                        n = ${n}
                    </td></tr>
                </table>`;

            drawResidualPlots(predicted, residuals);

            const sdRes  = Math.sqrt(ssRes / (n-1));
            const skew   = sdRes > 0 ? residuals.reduce((s,r) => s+((r/sdRes)**3), 0)/n : 0;
            const sigCnt = pVals.slice(1).filter(p => p < 0.05).length;

            document.getElementById('regInterpretation').innerHTML = `
                <strong>Model:</strong> Explains ${(rsq*100).toFixed(1)}% of variance in ${yVar} (Adj. R² = ${(adjRsq*100).toFixed(1)}%).<br>
                <strong>Overall Fit:</strong> ${fP<0.05?'✓ Statistically significant (p < 0.05).':'✗ Not significant (p ≥ 0.05).'}<br>
                <strong>Significant Terms:</strong> ${sigCnt} of ${k} (after dummy expansion).<br>
                <strong>AIC:</strong> ${aicVal.toFixed(2)} — lower is better when comparing models on the same data.<br>
                <strong>Residuals:</strong> Skewness = ${skew.toFixed(3)}
                (${Math.abs(skew)<0.5?'approximately normal':Math.abs(skew)<1?'moderate departure':'strong departure'}).`;

        } catch (err) {
            res.innerHTML = `<div class="warning-box">⚠️ Regression failed: ${err.message}. The matrix may be singular — check for perfect multicollinearity or a categorical variable with only one observed level in this dataset.</div>`;
        }
    }, 20);
}

function drawResidualPlots(predicted, residuals) {
    // FIX #10: avoid spread on large arrays
    const n = residuals.length;

    const ctx1 = document.getElementById('residualPlot')?.getContext('2d');
    if (ctx1) {
        if (charts['residual']) { charts['residual'].destroy(); charts['residual'] = null; }
        charts['residual'] = new Chart(ctx1, {
            type: 'scatter',
            data: { datasets: [{ label: 'Residuals', data: predicted.map((p, i) => ({ x: p, y: residuals[i] })), backgroundColor: 'rgba(102,126,234,0.5)', pointRadius: 4 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'Residuals vs Fitted Values' } }, scales: { x: { title: { display: true, text: 'Fitted Values' } }, y: { title: { display: true, text: 'Residuals' } } } }
        });
    }

    const ctx2 = document.getElementById('qqPlot')?.getContext('2d');
    if (ctx2) {
        if (charts['qq']) { charts['qq'].destroy(); charts['qq'] = null; }
        const sorted = [...residuals].sort((a, b) => a - b);
        const mean = sorted.reduce((a, b) => a + b, 0) / n;
        const sd = Math.sqrt(sorted.reduce((s, r) => s + (r - mean) ** 2, 0) / (n - 1));
        // FIX #10: use Array.from instead of spread for large arrays
        const theoretical = Array.from({ length: n }, (_, i) => normalQuantile((i + 0.5) / n));
        const standardized = sorted.map(r => sd > 0 ? (r - mean) / sd : 0);
        // FIX #10: safe min/max via reduce
        const allVals = theoretical.concat(standardized);
        const minV = allVals.reduce((a, b) => Math.min(a, b), Infinity);
        const maxV = allVals.reduce((a, b) => Math.max(a, b), -Infinity);

        charts['qq'] = new Chart(ctx2, {
            type: 'scatter',
            data: {
                datasets: [
                    { label: 'Q-Q', data: theoretical.map((t, i) => ({ x: t, y: standardized[i] })), backgroundColor: 'rgba(102,126,234,0.5)', pointRadius: 4 },
                    { label: 'y=x', data: [{ x: minV, y: minV }, { x: maxV, y: maxV }], type: 'line', borderColor: 'red', borderWidth: 2, pointRadius: 0, fill: false }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'Normal Q-Q Plot' } }, scales: { x: { title: { display: true, text: 'Theoretical Quantiles' } }, y: { title: { display: true, text: 'Sample Quantiles' } } } }
        });
    }
}

function initANOVA() { updateANOVA(); }

function updateANOVA() {
    const selResp = getSelectedCheckboxes('anovaResp');
    const selGroup = getSelectedRadio('anovaGroup');
    if (!selResp.length || !selGroup) return;

    const groups = [...new Set(data.map(d => d[selGroup]).filter(g => g !== undefined && g !== ''))];
    if (groups.length < 2) { document.getElementById('anovaResults').innerHTML = '<div class="warning-box">Need at least 2 groups.</div>'; return; }

    let rows = '', sig = 0;

    selResp.forEach(rv => {
        const gData = {};
        groups.forEach(g => gData[g] = []);
        data.forEach(d => { if (d[selGroup] in gData && typeof d[rv] === 'number' && !isNaN(d[rv])) gData[d[selGroup]].push(d[rv]); });

        const allVals = groups.flatMap(g => gData[g]);
        if (allVals.length === 0) return;
        const N = allVals.length;
        const grandMean = allVals.reduce((a, b) => a + b, 0) / N;

        let SSB = 0, SSW = 0;
        groups.forEach(g => {
            const vals = gData[g];
            if (!vals.length) return;
            const gm = vals.reduce((a, b) => a + b, 0) / vals.length;
            SSB += vals.length * (gm - grandMean) ** 2;
            vals.forEach(v => SSW += (v - gm) ** 2);
        });

        const dfB = groups.length - 1, dfW = N - groups.length;
        const F = (SSB / dfB) / (SSW / dfW);
        const p = fPValue(F, dfB, dfW); // FIX #3
        const isSig = p < 0.05;
        if (isSig) sig++;
        rows += `<tr>
            <td><strong>${rv}</strong></td><td>${SSB.toFixed(2)}</td><td>${SSW.toFixed(2)}</td>
            <td>${F.toFixed(3)}</td><td>${dfB}, ${dfW}</td><td>${fmtP(p)}</td>
            <td><span class="status-badge ${isSig ? 'status-significant' : 'status-not-significant'}">${isSig ? '✓' : '✗'}</span></td>
        </tr>`;
        lastResults[`ANOVA (${rv})`] = `F(${dfB},${dfW})=${F.toFixed(3)}, p=${fmtP(p)}`;
    });

    document.getElementById('anovaResults').innerHTML = `
        <h3>ANOVA by ${selGroup} (${groups.length} groups: ${groups.join(', ')})</h3>
        <table class="results-table">
            <tr><th>Response</th><th>Between SS</th><th>Within SS</th><th>F</th><th>df (B, W)</th><th>p-value</th><th>Sig.</th></tr>
            ${rows}
        </table>`;
    document.getElementById('anovaInterpretation').innerHTML =
        `<strong>Interpretation:</strong> ${sig} of ${selResp.length} variable(s) show significant differences across ${selGroup} groups at α = 0.05.`;
}

            let sxx = 0, syy = 0, sxy = 0;
            for (let idx = 0; idx < n; idx++) { sxx += (xs[idx] - xm) ** 2; syy += (ys[idx] - ym) ** 2; sxy += (xs[idx] - xm) * (ys[idx] - ym); }
            const r = sxy / Math.sqrt(sxx * syy);
            // FIX #11: Compute p-value for correlation
            const t = r * Math.sqrt((n - 2) / (1 - r * r));
            const p = tPValue(t, n - 2);
            const isSig = p < 0.05;
            const absr = Math.abs(r);
            let bg = '';
            if (absr > 0.7) bg = r > 0 ? 'background:rgba(72,187,120,0.35)' : 'background:rgba(245,101,101,0.35)';

            // Show r and significance

                ${r.toFixed(3)}${isSig ? '<sup style="color:#c53030;font-weight:bold">*</sup>' : ''}
            </td>`;
        });
        rows += '</tr>';

    document.getElementById('corrResults').innerHTML = `

        <p style="padding:10px;font-size:0.85em;color:#666">* p &lt; 0.05 &nbsp;|&nbsp; Hover over cell for details. Green = positive, Red = negative correlation.</p>`;
    document.getElementById('corrInterpretation').innerHTML =
        `<strong>Correlation Matrix</strong> for ${sel.length} variables (n up to ${data.length}). Asterisk (*) marks correlations significant at α = 0.05 using t-test: t = r√((n−2)/(1−r²)).`;
}

// ── Logistic helpers ─────────────────────────────────────────
function sigmoid(x) { return 1 / (1 + Math.exp(-x)); }

// Normal CDF via erf approximation (for Wald z p-values)
function normalCDF(z) {
    // Abramowitz & Stegun 26.2.17, max error 7.5e-8
    const t = 1 / (1 + 0.2316419 * Math.abs(z));
    const poly = t * (0.319381530 + t * (-0.356563782 + t * (1.781477937 + t * (-1.821255978 + t * 1.330274429))));
    const p = 1 - (1 / Math.sqrt(2 * Math.PI)) * Math.exp(-0.5 * z * z) * poly;
    return z >= 0 ? p : 1 - p;
}
function zPValue(z) { return 2 * (1 - normalCDF(Math.abs(z))); }
function zInv(p) { return normalQuantile(p); } // reuse existing function

// IRLS (Iteratively Reweighted Least Squares) — Newton-Raphson for logistic
// Xrows : n×p matrix (includes intercept column), y : 0/1 array
// Returns { beta, vcov, converged, iter, logLik }
function fitLogistic(Xrows, y, maxIter = 100, tol = 1e-8) {
    const n = Xrows.length;
    const p = Xrows[0].length;

    // initialise beta to zeros
    let beta = Array(p).fill(0);

    let logLik = -Infinity;
    let converged = false;
    let iter = 0;

    for (iter = 0; iter < maxIter; iter++) {
        // predicted probabilities
        const mu = Xrows.map(row => sigmoid(row.reduce((s, xi, j) => s + xi * beta[j], 0)));

        // working weights W = mu*(1-mu), working response z_i = eta_i + (y_i-mu_i)/w_i
        const W = mu.map((m, i) => Math.max(m * (1 - m), 1e-10));

        // Gradient: X'(y - mu)
        const grad = Array(p).fill(0);
        for (let j = 0; j < p; j++)
            for (let i = 0; i < n; i++)
                grad[j] += Xrows[i][j] * (y[i] - mu[i]);

        // Hessian: -X'WX
        const H = Array.from({length: p}, () => Array(p).fill(0));
        for (let j = 0; j < p; j++)
            for (let k2 = j; k2 < p; k2++) {
                let s = 0;
                for (let i = 0; i < n; i++) s += Xrows[i][j] * W[i] * Xrows[i][k2];
                H[j][k2] = H[k2][j] = -s;
            }

        // Newton step: beta += -H^{-1} grad  →  solve H * delta = -grad
        let Hm, invH;
        try {
            Hm  = math.matrix(H);
            invH = math.inv(Hm);
        } catch { break; }

        const delta = Array(p).fill(0);
        for (let j = 0; j < p; j++)
            for (let k2 = 0; k2 < p; k2++)
                delta[j] -= invH.get([j, k2]) * grad[k2];

        const newBeta = beta.map((b, j) => b + delta[j]);

        // log-likelihood
        const newMu = Xrows.map(row => sigmoid(row.reduce((s, xi, j) => s + xi * newBeta[j], 0)));
        const newLL = y.reduce((s, yi, i) => s + (yi === 1 ? Math.log(Math.max(newMu[i], 1e-15)) : Math.log(Math.max(1 - newMu[i], 1e-15))), 0);

        const maxDelta = delta.reduce((m, d) => Math.max(m, Math.abs(d)), 0);
        beta   = newBeta;
        logLik = newLL;
        if (maxDelta < tol) { converged = true; break; }
    }

    // Variance-covariance = (-H)^{-1}  evaluated at final beta
    const mu = Xrows.map(row => sigmoid(row.reduce((s, xi, j) => s + xi * beta[j], 0)));
    const W  = mu.map(m => Math.max(m * (1 - m), 1e-10));
    const FI = Array.from({length: p}, () => Array(p).fill(0)); // Fisher Information = X'WX
    for (let j = 0; j < p; j++)
        for (let k2 = j; k2 < p; k2++) {
            let s = 0;
            for (let i = 0; i < n; i++) s += Xrows[i][j] * W[i] * Xrows[i][k2];
            FI[j][k2] = FI[k2][j] = s;
        }

    let vcov;
    try { vcov = math.inv(math.matrix(FI)).valueOf(); }
    catch { vcov = Array.from({length:p}, (_, i) => Array.from({length:p}, (_2, j) => i===j ? 1e10 : 0)); }

    return { beta, vcov, converged, iter, logLik };
}

// ── Build design matrix for logistic (same dummy-coding logic) ──
function buildLogisticDesign(xVars, validData) {
    const specs = xVars.map(v => {
        if (categoricalCols.includes(v)) {
            const levels = [...new Set(validData.map(d => String(d[v])))].sort();
            return { v, type: 'cat', reference: levels[0], dummies: levels.slice(1) };
        }
        return { v, type: 'num' };
    });
    function getRow(row) {
        const vals = [];
        specs.forEach(s => {
            if (s.type === 'num') { vals.push(row[s.v]); }
            else { const lv = String(row[s.v]); s.dummies.forEach(d => vals.push(lv === d ? 1 : 0)); }
        });
        return vals;
    }
    const k = specs.reduce((s, sp) => s + (sp.type === 'num' ? 1 : sp.dummies.length), 0);
    return { specs, getRow, k };
}
