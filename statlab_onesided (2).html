<div id="concept-tip"></div>
    <div class="header">

<script>
// ============================================================
// GLOBAL STATE
// ============================================================
let data = [];
let headers = [];
let numericCols = [];
let categoricalCols = [];
let currentTab = 0;
let charts = {};
let lastResults = {};

// One-sample state
let oneDirection = 'two';   // 'two' | 'left' | 'right'
let onePropValues = {};     // expected proportions for proportion mode

// ============================================================
// ACCURATE STATISTICAL DISTRIBUTION FUNCTIONS
// ============================================================
function incompleteBeta(x, a, b) {
    if (x < 0 || x > 1) return NaN;
    if (x === 0) return 0;
    if (x === 1) return 1;
    const lbeta = logGamma(a) + logGamma(b) - logGamma(a + b);
    const front = Math.exp(Math.log(x) * a + Math.log(1 - x) * b - lbeta) / a;
    function betaCF(x, a, b) {
        const MAXIT=200,EPS=3e-12,FPMIN=1e-300,qab=a+b,qap=a+1,qam=a-1;
        let c=1,d=1-qab*x/qap;
        if(Math.abs(d)<FPMIN)d=FPMIN; d=1/d; let h=d;
        for(let m=1;m<=MAXIT;m++){
            const m2=2*m; let aa=m*(b-m)*x/((qam+m2)*(a+m2));
            d=1+aa*d; if(Math.abs(d)<FPMIN)d=FPMIN; c=1+aa/c; if(Math.abs(c)<FPMIN)c=FPMIN; d=1/d; h*=d*c;
            aa=-(a+m)*(qab+m)*x/((a+m2)*(qap+m2));
            d=1+aa*d; if(Math.abs(d)<FPMIN)d=FPMIN; c=1+aa/c; if(Math.abs(c)<FPMIN)c=FPMIN; d=1/d;
            const del=d*c; h*=del; if(Math.abs(del-1)<EPS)break;
        }
        return h;
    }
    if (x < (a+1)/(a+b+2)) return front * betaCF(x, a, b);
    else return 1 - Math.exp(Math.log(1-x)*b + Math.log(x)*a - lbeta)/b * betaCF(1-x, b, a);
}

function logGamma(x) {
    const g=7, c=[0.99999999999980993,676.5203681218851,-1259.1392167224028,771.32342877765313,-176.61502916214059,12.507343278686905,-0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
    if(x<0.5) return Math.log(Math.PI/Math.sin(Math.PI*x))-logGamma(1-x);
    x-=1; let a=c[0]; const t=x+g+0.5;
    for(let i=1;i<g+2;i++) a+=c[i]/(x+i);
    return 0.5*Math.log(2*Math.PI)+(x+0.5)*Math.log(t)-t+Math.log(a);
}

function incompleteGammaUpper(a, x) {
    if(x<0) return 1; if(x===0) return 1;
    if(x<a+1) return 1-incompleteGammaLowerSeries(a,x);
    else return incompleteGammaUpperCF(a,x);
}
function incompleteGammaLowerSeries(a, x) {
    const MAXIT=200,EPS=3e-12;
    if(x<=0) return 0;
    let ap=a,sum=1/a,del=sum;
    for(let n=1;n<=MAXIT;n++){ap++;del*=x/ap;sum+=del;if(Math.abs(del)<Math.abs(sum)*EPS)break;}
    return sum*Math.exp(-x+a*Math.log(x)-logGamma(a));
}
function incompleteGammaUpperCF(a, x) {
    const MAXIT=200,EPS=3e-12,FPMIN=1e-300;
    let b=x+1-a,c=1/FPMIN,d=1/b,h=d;
    for(let i=1;i<=MAXIT;i++){const an=-i*(i-a);b+=2;d=an*d+b;if(Math.abs(d)<FPMIN)d=FPMIN;c=b+an/c;if(Math.abs(c)<FPMIN)c=FPMIN;d=1/d;const del=d*c;h*=del;if(Math.abs(del-1)<EPS)break;}
    return Math.exp(-x+a*Math.log(x)-logGamma(a))*h;
}

// Two-tail p-value for t-statistic
function tPValue(t, df) {
    const x = df / (df + t*t);
    return incompleteBeta(x, df/2, 0.5);
}

// CDF: P(T ≤ t) for the t-distribution
function tCDF(t, df) {
    const x = df / (df + t*t);
    const twoTail = incompleteBeta(x, df/2, 0.5); // P(|T| > |t|)
    return t >= 0 ? 1 - twoTail/2 : twoTail/2;
}

// One-sided p-values
function tPLeft(t, df)  { return tCDF(t, df); }          // H₁: μ < μ₀  → P(T ≤ t)
function tPRight(t, df) { return 1 - tCDF(t, df); }      // H₁: μ > μ₀  → P(T ≥ t)

// t critical value via bisection on tCDF
function tInv(p, df) {
    if(p<=0) return -Infinity; if(p>=1) return Infinity; if(p===0.5) return 0;
    let lo=0, hi=100;
    for(let i=0;i<100;i++){
        const mid=(lo+hi)/2;
        if(tCDF(mid,df)<p) lo=mid; else hi=mid;
        if(hi-lo<1e-9) break;
    }
    return (lo+hi)/2;
}

function chiSqPValue(x, df) {
    if(x<=0) return 1;
    return incompleteGammaUpper(df/2, x/2);
}

function fPValue(F, df1, df2) {
    if(F<=0) return 1;
    const x = df2/(df2+df1*F);
    return incompleteBeta(x, df2/2, df1/2);
}

function normalQuantile(p) {
    if(p<=0) return -8; if(p>=1) return 8;
    const a=[0,-3.969683028665376e+01,2.209460984245205e+02,-2.759285104469687e+02,1.383577518672690e+02,-3.066479806614716e+01,2.506628277459239e+00];
    const b=[0,-5.447609879822406e+01,1.615858368580409e+02,-1.556989798598866e+02,6.680131188771972e+01,-1.328068155288572e+01];
    const c=[0,-7.784894002430293e-03,-3.223964580411365e-01,-2.400758277161838e+00,-2.549732539343734e+00,4.374664141464968e+00,2.938163982698783e+00];
    const d=[0,7.784695709041462e-03,3.224671290700398e-01,2.445134137142996e+00,3.754408661907416e+00];
    const pLow=0.02425,pHigh=1-pLow; let q,r;
    if(p<pLow){q=Math.sqrt(-2*Math.log(p));return(((((c[1]*q+c[2])*q+c[3])*q+c[4])*q+c[5])*q+c[6])/((((d[1]*q+d[2])*q+d[3])*q+d[4])*q+1);}
    else if(p<=pHigh){q=p-0.5;r=q*q;return(((((a[1]*r+a[2])*r+a[3])*r+a[4])*r+a[5])*r+a[6])*q/(((((b[1]*r+b[2])*r+b[3])*r+b[4])*r+b[5])*r+1);}
    else{q=Math.sqrt(-2*Math.log(1-p));return-(((((c[1]*q+c[2])*q+c[3])*q+c[4])*q+c[5])*q+c[6])/((((d[1]*q+d[2])*q+d[3])*q+d[4])*q+1);}
}

// Wilson score confidence interval for a proportion
// alpha: significance level (0.05 for 95% CI)
// Returns [lo, hi]; for one-sided returns [lo, 1] or [0, hi]
function wilsonCI(x, n, alpha, direction='two') {
    if (n === 0) return [0, 1];
    const phat = x / n;
    const z = direction === 'two' ? normalQuantile(1 - alpha/2) : normalQuantile(1 - alpha);
    const denom = 1 + z*z/n;
    const centre = (phat + z*z/(2*n)) / denom;
    const margin = z * Math.sqrt(phat*(1-phat)/n + z*z/(4*n*n)) / denom;
    if (direction === 'left')  return [0,            Math.min(1, centre + margin)];
    if (direction === 'right') return [Math.max(0, centre - margin), 1];
    return [Math.max(0, centre - margin), Math.min(1, centre + margin)];
}

// ============================================================
// SAMPLE DATA
// ============================================================
function loadSampleData() {
    data = [];
    const n = 200;
    for (let i = 0; i < n; i++) {
        const age = 18 + Math.floor(Math.random() * 60);
        const height = 150 + Math.random() * 40;
        const weight = 50 + Math.random() * 50;
        const bmi = weight / ((height/100)**2);
        data.push({
            Age: age, Height: parseFloat(height.toFixed(2)),

function parseCSVLine(line) {
    const result=[]; let current='',inQuotes=false;
    for(let i=0;i<line.length;i++){
        const ch=line[i];
        if(ch==='"'){if(inQuotes&&line[i+1]==='"'){current+='"';i++;}else inQuotes=!inQuotes;}
        else if(ch===','&&!inQuotes){result.push(current.trim());current='';}
        else current+=ch;
    }
    result.push(current.trim()); return result;
}

document.getElementById('fileInput').addEventListener('change', function(e) {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=function(event){
        const lines=event.target.result.split(/\r?\n/).filter(l=>l.trim());
        headers=parseCSVLine(lines[0]); data=[]; numericCols=[]; categoricalCols=[];
        for(let i=1;i<Math.min(lines.length,5000);i++){
            if(!lines[i].trim()) continue;
            const values=parseCSVLine(lines[i]); let row={};
            for(let j=0;j<headers.length;j++){const val=j<values.length?values[j]:'';const num=parseFloat(val);row[headers[j]]=isNaN(num)?val:num;}
            data.push(row);
        }
        if(data.length>0){
            headers.forEach(h=>{
                let numericCount=0,total=0;
                for(let i=0;i<Math.min(50,data.length);i++){if(data[i][h]!==undefined&&data[i][h]!==''){total++;if(typeof data[i][h]==='number'&&!isNaN(data[i][h]))numericCount++;}}
                if(numericCount>total*0.8) numericCols.push(h); else categoricalCols.push(h);
            });
        }
        updateVariableSummary(); renderTab(currentTab);
    };
    reader.readAsText(file);
});

/* Determine which mode to use for a given variable:
   - If variable is categorical → proportion mode
   - If variable is numeric but has ≤ 5 distinct observed values → proportion mode
   - Otherwise → mean mode (t-test)
*/
function getOneSampleMode(varName) {
    if (!varName) return null;
    if (categoricalCols.includes(varName)) return 'proportion';
    const vals = data.map(d => d[varName]).filter(v => v !== '' && v !== undefined && v !== null);
    const distinct = new Set(vals.map(String));
    return distinct.size <= 5 ? 'proportion' : 'mean';
}

}

function initOneSample() { updateOneSample(); }

// Track which variable is currently showing proportion inputs
let _onePropVar = null;

function setOnePropEqual() {
    const cats = Object.keys(onePropValues);
    if (!cats.length) return;
    const eq = 1 / cats.length;
    cats.forEach(c => {
        onePropValues[c] = eq;
        const el = document.getElementById(`oprop_${c.replace(/[^a-zA-Z0-9]/g,'_')}`);
        if (el) el.value = eq.toFixed(4);
    });
    updateOneSample();
}

function updateOneSample() {
    const selected = getSelectedCheckboxes('one');
    const conf     = parseFloat(document.getElementById('oneConf').value);
    const alpha    = 1 - conf;
    const nullVal  = parseFloat(document.getElementById('oneNull').value) || 0;

    if (!selected.length) {
        document.getElementById('oneResults').innerHTML   = '<p style="text-align:center;padding:20px;color:#718096;">Select at least one variable above.</p>';
        document.getElementById('oneInterpretation').style.display = 'none';
        document.getElementById('one-prop-panel').style.display    = 'none';
        return;
    }

    // Separate into mean-mode and proportion-mode variables
    const meanVars = selected.filter(v => getOneSampleMode(v) === 'mean');
    const propVars = selected.filter(v => getOneSampleMode(v) === 'proportion');

    // Show proportion inputs only when exactly one prop-mode variable is selected
    // (multi-variable GoF each with own expected props would need separate panels)
    const showPropPanel = propVars.length > 0;
    document.getElementById('one-prop-panel').style.display = showPropPanel ? '' : 'none';

    // If prop var changed, reset proportion values
    const firstPropVar = propVars[0] || null;
    if (firstPropVar !== _onePropVar) {
        _onePropVar = firstPropVar;
        onePropValues = {};
    }

    // Rebuild proportion inputs for the first prop-mode variable
    if (firstPropVar) {
        const vals = data.map(d => d[firstPropVar]).filter(v => v !== '' && v !== undefined && v !== null);
        const cats = [...new Set(vals.map(String))].sort();
        if (!Object.keys(onePropValues).length) {
            cats.forEach(c => onePropValues[c] = 1 / cats.length);
        }
        // Ensure all cats are represented
        cats.forEach(c => { if (!(c in onePropValues)) onePropValues[c] = 0; });
        const propSum = Object.values(onePropValues).reduce((a,b)=>a+b,0);
        document.getElementById('one-prop-inputs').innerHTML = cats.map(c => {
            const safeId = `oprop_${c.replace(/[^a-zA-Z0-9]/g,'_')}`;
            return `<div class="proportion-input">
                <label>${c}:</label>
                <input type="number" id="${safeId}" value="${(onePropValues[c]||0).toFixed(4)}"
                       min="0" max="1" step="0.001"
                       onchange="onePropValues['${c}']=parseFloat(this.value)||0;updateOneSample()">
            </div>`;
        }).join('');
        const warn = document.getElementById('one-prop-sum-warn');
        warn.textContent = Math.abs(propSum - 1) > 0.001
            ? `⚠ Sum = ${propSum.toFixed(4)} — will be normalised automatically.` : '';
    }

    let html = '';
    let interpLines = [];
    let sigCount = 0, totalTests = 0;

    // ── MEAN MODE ──────────────────────────────────────────
    if (meanVars.length > 0) {
        let rows = '';
        const dirLabel = oneDirection === 'two' ? 'Two-sided' : oneDirection === 'left' ? 'Left-sided' : 'Right-sided';
        const h1Label  = oneDirection === 'two' ? 'H₁: μ ≠ μ₀' : oneDirection === 'left' ? 'H₁: μ &lt; μ₀' : 'H₁: μ &gt; μ₀';

        // CI label
        const ciLabel = oneDirection === 'two'
            ? `${(conf*100).toFixed(0)}% CI`
            : `${(conf*100).toFixed(0)}% One-sided Bound`;

        meanVars.forEach(v => {
            const vals = data.map(d => d[v]).filter(x => typeof x === 'number' && !isNaN(x));
            if (vals.length < 2) return;
            const n    = vals.length;
            const xbar = vals.reduce((a,b) => a+b, 0) / n;
            const sd   = Math.sqrt(vals.reduce((s,x) => s+(x-xbar)**2, 0) / (n-1));
            const se   = sd / Math.sqrt(n);
            const t    = (xbar - nullVal) / se;
            const df   = n - 1;

            // Direction-aware p-value
            let p;
            if      (oneDirection === 'two')   p = tPValue(t, df);
            else if (oneDirection === 'left')   p = tPLeft(t, df);
            else                                p = tPRight(t, df);

            // Direction-aware CI
            // two-sided:  xbar ± t_{α/2} · se
            // left:       (−∞,  xbar + t_{α} · se]   (upper bound only)
            // right:      [xbar − t_{α} · se,  +∞)   (lower bound only)
            const tCritTwo  = tInv(1 - alpha/2, df);
            const tCritOne  = tInv(1 - alpha,   df);
            let ciLo, ciHi;
            if (oneDirection === 'two') {
                ciLo = xbar - tCritTwo * se;
                ciHi = xbar + tCritTwo * se;
            } else if (oneDirection === 'left') {
                ciLo = null;                       // −∞
                ciHi = xbar + tCritOne * se;
            } else {
                ciLo = xbar - tCritOne * se;
                ciHi = null;                       // +∞
            }
            const ciStr = oneDirection === 'two'
                ? `[${ciLo.toFixed(3)}, ${ciHi.toFixed(3)}]`
                : oneDirection === 'left'
                    ? `(−∞, ${ciHi.toFixed(3)}]`
                    : `[${ciLo.toFixed(3)}, +∞)`;

            const isSig = p < alpha;
            if (isSig) sigCount++;
            totalTests++;

            rows += `<tr>
                <td><strong>${v}</strong> <span class="mode-badge mode-mean">mean</span></td>
                <td>${n}</td>
                <td>${xbar.toFixed(3)}</td>
                <td>${sd.toFixed(3)}</td>
                <td>${se.toFixed(3)}</td>
                <td>${t.toFixed(3)}</td>
                <td>${df}</td>
                <td>${fmtP(p)}</td>
                <td>${ciStr}</td>
                <td><span class="status-badge ${isSig?'status-significant':'status-not-significant'}">${isSig?'✓':'✗'}</span></td>
            </tr>`;
            lastResults[`One-sample t (${v})`] = `t=${t.toFixed(3)}, df=${df}, p=${fmtP(p)}, ${dirLabel}`;
        });

        html += `
            <div style="margin-bottom:6px;padding:8px 14px;background:#ebf4ff;border-radius:6px;font-size:0.88em;color:#3c366b;">
                <strong>Mean tests</strong> — ${dirLabel} (${h1Label}), μ₀ = ${nullVal}, α = ${alpha}
            </div>
            <div style="overflow-x:auto;margin-bottom:16px;">
            <table class="results-table">
                <thead><tr>
                    <th>Variable</th><th>n</th><th>Mean</th><th>SD</th><th>SE</th>
                    <th>t</th><th>df</th><th>p-value</th><th>${ciLabel}</th><th>Sig.</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table></div>`;

        interpLines.push(`<strong>Mean tests:</strong> ${sigCount} of ${meanVars.length} variable(s) reject H₀ at α = ${alpha} (${dirLabel} t-test, μ₀ = ${nullVal}).`);
    }

    // ── PROPORTION MODE ────────────────────────────────────
    if (propVars.length > 0) {
        propVars.forEach(v => {
            const vals = data.map(d => d[v]).filter(x => x !== '' && x !== undefined && x !== null);
            const cats = [...new Set(vals.map(String))].sort();
            const total = vals.length;

            // Observed counts
            const obs = {};
            cats.forEach(c => obs[c] = 0);
            vals.forEach(x => obs[String(x)]++);

            // Expected proportions (from onePropValues for the first prop var, equal otherwise)
            let expProps;
            if (v === firstPropVar && Object.keys(onePropValues).length) {
                const rawSum = cats.reduce((s, c) => s + (onePropValues[c]||0), 0) || 1;
                expProps = {};
                cats.forEach(c => expProps[c] = (onePropValues[c]||0) / rawSum);
            } else {
                expProps = {};
                cats.forEach(c => expProps[c] = 1 / cats.length);
            }

            // χ² GoF
            let chiSq = 0;
            const smallCells = cats.filter(c => expProps[c] * total < 5).length;
            let tableRows = '';
            cats.forEach(c => {
                const o = obs[c], e = expProps[c] * total;
                const contrib = e > 0 ? (o - e)**2 / e : 0;
                chiSq += contrib;
                tableRows += `<tr>
                    <td>${c}</td>
                    <td>${o}</td>
                    <td>${(o/total).toFixed(4)}</td>
                    <td>${expProps[c].toFixed(4)}</td>
                    <td>${e.toFixed(2)}</td>
                    <td>${contrib.toFixed(3)}</td>
                </tr>`;
            });
            const df = cats.length - 1;
            const pChi = chiSqPValue(chiSq, df);
            const isSig = pChi < alpha;
            if (isSig) sigCount++;
            totalTests++;

            // For binary variables: also show Wilson CI for the event proportion
            let binarySection = '';
            if (cats.length === 2) {
                const eventCat = cats[1];  // second alphabetically = "event"
                const xBin = obs[eventCat];
                const phat = xBin / total;
                const [wLo, wHi] = wilsonCI(xBin, total, alpha, oneDirection);

                // One-sample z-test for proportion p₀
                // If nullVal is between 0 and 1 use it as p₀; else default 0.5
                const p0 = (nullVal > 0 && nullVal < 1) ? nullVal : 0.5;
                const se0 = Math.sqrt(p0 * (1 - p0) / total);
                const z   = (phat - p0) / se0;
                let pZ;
                if      (oneDirection === 'two')   pZ = 2*(1 - normalCDFApprox(Math.abs(z)));
                else if (oneDirection === 'left')   pZ = normalCDFApprox(z);
                else                                pZ = 1 - normalCDFApprox(z);

                const ciStr = oneDirection === 'two'
                    ? `[${wLo.toFixed(4)}, ${wHi.toFixed(4)}]`
                    : oneDirection === 'left'
                        ? `(0, ${wHi.toFixed(4)}]`
                        : `[${wLo.toFixed(4)}, 1)`;

                binarySection = `
                    <div class="info-box" style="margin-top:10px;">
                        <strong>Binary z-test for ${eventCat}:</strong>
                        p̂ = ${xBin}/${total} = ${phat.toFixed(4)},
                        H₀: p = ${p0}, z = ${z.toFixed(3)}, p = ${fmtP(pZ)}
                        &nbsp;|&nbsp; Wilson ${(conf*100).toFixed(0)}% CI: ${ciStr}
                        ${pZ < alpha
                            ? `<br>✓ Significant: observed proportion differs from ${p0}.`
                            : `<br>✗ Not significant (p ≥ ${alpha}).`}
                    </div>`;
                lastResults[`One-sample z (${v})`] = `z=${z.toFixed(3)}, p=${fmtP(pZ)}, p0=${p0}`;
            }

            html += `
                <div style="margin-bottom:6px;padding:8px 14px;background:#fff3e0;border-radius:6px;font-size:0.88em;color:#7b341e;">
                    <strong>${v}</strong> <span class="mode-badge mode-prop">proportion mode</span>
                    — ${cats.length} categories, N = ${total}, χ²(${df}) = ${chiSq.toFixed(3)}, p = ${fmtP(pChi)}
                    <span class="status-badge ${isSig?'status-significant':'status-not-significant'}" style="margin-left:8px;">${isSig?'✓ Sig.':'✗ n.s.'}</span>
                </div>
                ${smallCells > 0 ? `<div class="warning-box">⚠ ${smallCells} cell(s) have expected count &lt; 5 — χ² approximation may be unreliable.</div>` : ''}
                <div style="overflow-x:auto;margin-bottom:8px;">
                <table class="results-table">
                    <thead><tr>
                        <th>Category</th><th>Observed</th><th>Obs. Prop.</th>
                        <th>Expected Prop.</th><th>Expected n</th><th>(O−E)²/E</th>
                    </tr></thead>
                    <tbody>${tableRows}
                    <tr style="font-weight:700;background:#f8f9fa;">
                        <td>Total</td><td>${total}</td><td>1.0000</td><td>1.0000</td><td>${total.toFixed(2)}</td>
                        <td>χ² = ${chiSq.toFixed(3)}</td>
                    </tr>
                    </tbody>
                </table></div>
                ${binarySection}`;

            lastResults[`Chi-sq GoF (${v})`] = `χ²=${chiSq.toFixed(3)}, df=${df}, p=${fmtP(pChi)}`;
            interpLines.push(`<strong>${v} (proportion):</strong> χ²(${df}) = ${chiSq.toFixed(3)}, p = ${fmtP(pChi)} — ${isSig?'significant difference from expected proportions.':'no significant difference from expected proportions.'}`);
        });
    }

    document.getElementById('oneResults').innerHTML = html ||
        '<p style="text-align:center;padding:20px;color:#718096;">No valid variables selected.</p>';

    const interpEl = document.getElementById('oneInterpretation');
    if (interpLines.length) {
        interpEl.style.display = '';
        interpEl.innerHTML = '<strong>Summary:</strong><ul style="margin-top:8px;padding-left:20px;line-height:1.9;">'
            + interpLines.map(l => `<li>${l}</li>`).join('') + '</ul>';
    } else {
        interpEl.style.display = 'none';
    }
}

// Normal CDF for the proportion z-test (Abramowitz & Stegun 26.2.16)
function normalCDFApprox(z) {
    const t = 1/(1+0.2316419*Math.abs(z));
    const poly = t*(0.319381530+t*(-0.356563782+t*(1.781477937+t*(-1.821255978+t*1.330274429))));
    const p = 1-(1/Math.sqrt(2*Math.PI))*Math.exp(-0.5*z*z)*poly;
    return z>=0?p:1-p;
}

function initTwoSample(){updateTwoSample();}
function updateTwoSample(){
    const selNum=getSelectedCheckboxes('twoNum'),selGroup=getSelectedRadio('twoGroup');
    if(!selNum.length||!selGroup)return;
    const groups=[...new Set(data.map(d=>d[selGroup]).filter(g=>g!==undefined&&g!==''))];
    if(groups.length!==2){document.getElementById('twoResults').innerHTML=`<div class="warning-box">⚠️ Grouping variable must have exactly 2 groups. Found: ${groups.length} (${groups.join(', ')})</div>`;return;}
    const[g1,g2]=groups;let rows='',sig=0;
    selNum.forEach(v=>{
        const v1=data.filter(d=>d[selGroup]===g1).map(d=>d[v]).filter(x=>typeof x==='number'&&!isNaN(x));
        const v2=data.filter(d=>d[selGroup]===g2).map(d=>d[v]).filter(x=>typeof x==='number'&&!isNaN(x));
        if(v1.length<2||v2.length<2)return;
        const n1=v1.length,n2=v2.length,m1=v1.reduce((a,b)=>a+b,0)/n1,m2=v2.reduce((a,b)=>a+b,0)/n2;
        const s1=v1.reduce((s,x)=>s+(x-m1)**2,0)/(n1-1),s2=v2.reduce((s,x)=>s+(x-m2)**2,0)/(n2-1);
        const se=Math.sqrt(s1/n1+s2/n2),t=(m1-m2)/se;
        const df=(s1/n1+s2/n2)**2/((s1/n1)**2/(n1-1)+(s2/n2)**2/(n2-1));
        const p=tPValue(t,df);const isSig=p<0.05;if(isSig)sig++;
        rows+=`<tr><td><strong>${v}</strong></td><td>n=${n1}, μ=${m1.toFixed(2)}, SD=${Math.sqrt(s1).toFixed(2)}</td><td>n=${n2}, μ=${m2.toFixed(2)}, SD=${Math.sqrt(s2).toFixed(2)}</td><td>${(m1-m2).toFixed(3)}</td><td>${t.toFixed(3)}</td><td>${df.toFixed(1)}</td><td>${fmtP(p)}</td><td><span class="status-badge ${isSig?'status-significant':'status-not-significant'}">${isSig?'✓':'✗'}</span></td></tr>`;
    });
    document.getElementById('twoResults').innerHTML=`<h3>Comparing "${g1}" vs "${g2}"</h3><table class="results-table"><tr><th>Variable</th><th>${g1}</th><th>${g2}</th><th>Difference</th><th>t</th><th>df (Welch)</th><th>p-value</th><th>Sig.</th></tr>${rows}</table>`;
    document.getElementById('twoInterpretation').innerHTML=`<strong>Interpretation:</strong> ${sig} of ${selNum.length} variable(s) differ significantly between groups at α = 0.05 (Welch's t-test).`;
}

function initChiSquare(){ updateChiSquare(); }

function updateChiSquare(){
    const rowVar = getSelectedRadio('chiRow');
    const colVar = getSelectedRadio('chiCol');
    const resEl  = document.getElementById('chiResults');
    const intEl  = document.getElementById('chiInterpretation');

    if(!rowVar || !colVar){
        resEl.innerHTML='<p style="text-align:center;padding:20px;color:#718096;">Select a row variable and a column variable above.</p>';
        intEl.style.display='none';
        return;
    }
    if(rowVar === colVar){
        resEl.innerHTML='<div class="warning-box">⚠ Row and column variables must be different.</div>';
        intEl.style.display='none';
        return;
    }

    runChiSquareIndependence(rowVar, colVar);
}

function runChiSquareIndependence(rowVar, colVar){
    const resEl = document.getElementById('chiResults');
    const intEl = document.getElementById('chiInterpretation');

    // Collect complete pairs
    const pairs = data.filter(d =>
        d[rowVar]!==undefined && d[rowVar]!==null && d[rowVar]!=='' &&
        d[colVar]!==undefined && d[colVar]!==null && d[colVar]!==''
    );
    const N = pairs.length;
    if(N < 2){ resEl.innerHTML='<div class="warning-box">⚠ Not enough complete observations.</div>'; intEl.style.display='none'; return; }

    const rowCats = [...new Set(pairs.map(d=>String(d[rowVar])))].sort();
    const colCats = [...new Set(pairs.map(d=>String(d[colVar])))].sort();
    const R = rowCats.length, C = colCats.length;

    if(R < 2){ resEl.innerHTML='<div class="warning-box">⚠ Row variable needs at least 2 categories.</div>'; intEl.style.display='none'; return; }
    if(C < 2){ resEl.innerHTML='<div class="warning-box">⚠ Column variable needs at least 2 categories.</div>'; intEl.style.display='none'; return; }

    // Build observed frequency table: obs[r][c]
    const obs = Array.from({length:R}, ()=>Array(C).fill(0));
    pairs.forEach(d=>{
        const r = rowCats.indexOf(String(d[rowVar]));
        const c = colCats.indexOf(String(d[colVar]));
        obs[r][c]++;
    });

    // Marginal totals
    const rowTotals = obs.map(row => row.reduce((s,v)=>s+v,0));
    const colTotals = Array.from({length:C}, (_,c)=>obs.reduce((s,row)=>s+row[c],0));

    // Expected frequencies: E[r][c] = rowTotal[r] * colTotal[c] / N
    const exp = Array.from({length:R}, (_,r)=>
        Array.from({length:C}, (_,c)=> rowTotals[r]*colTotals[c]/N)
    );

    // Chi-square statistic
    let chiSq = 0;
    let smallCells = 0;
    obs.forEach((row,r)=>row.forEach((o,c)=>{
        const e = exp[r][c];
        if(e < 5) smallCells++;
        if(e > 0) chiSq += (o-e)**2 / e;
    }));

    const df = (R-1)*(C-1);
    const p  = chiSqPValue(chiSq, df);

    // Effect size: Cramér's V
    const cramersV = Math.sqrt(chiSq / (N * (Math.min(R,C)-1)));

    // Yates' continuity correction (only for 2×2)
    let yatesInfo = '';
    let chiSqYates = null;
    let pYates = null;
    if(R===2 && C===2){
        chiSqYates = 0;
        obs.forEach((row,r)=>row.forEach((o,c)=>{
            const e=exp[r][c];
            if(e>0) chiSqYates += (Math.max(0,Math.abs(o-e)-0.5))**2 / e;
        }));
        pYates = chiSqPValue(chiSqYates, 1);
        yatesInfo = `<div class="info-box" style="margin-top:8px;">
            <strong>Yates' continuity correction (2×2):</strong>
            χ²<sub>Yates</sub> = ${chiSqYates.toFixed(3)}, p = ${fmtP(pYates)}
            <span style="color:#555;font-size:0.88em;"> — generally recommended for 2×2 tables with small samples.</span>
        </div>`;
    }

    // Build the contingency table HTML
    // Header row
    let tblHtml = `<table class="results-table" style="min-width:${(C+2)*100}px;">
        <thead>
            <tr>
                <th style="background:#eef2ff;">${rowVar} \\ ${colVar}</th>
                ${colCats.map(c=>`<th style="background:#eef2ff;">${c}</th>`).join('')}
                <th style="background:#dde4ff;">Row Total</th>
            </tr>
        </thead><tbody>`;

    rowCats.forEach((r,ri)=>{
        tblHtml += `<tr><td style="font-weight:700;color:#2d3748;">${r}</td>`;
        colCats.forEach((_,ci)=>{
            const o=obs[ri][ci], e=exp[ri][ci];
            const contrib = e>0?(o-e)**2/e:0;
            const isSmall = e<5;
            // Show observed, then expected below in smaller text, then contribution
            tblHtml += `<td style="${isSmall?'background:#fff8e1;':''}" title="(O−E)²/E = ${contrib.toFixed(3)}">
                <strong>${o}</strong>
                <br><span style="font-size:0.75em;color:#718096;">E=${e.toFixed(2)}</span>
                <br><span style="font-size:0.72em;color:#a0aec0;">(${contrib.toFixed(3)})</span>
            </td>`;
        });
        tblHtml += `<td style="font-weight:700;background:#f7f8ff;">${rowTotals[ri]}</td></tr>`;
    });

    // Column totals row
    tblHtml += `<tr style="font-weight:700;background:#f7f8ff;">
        <td>Column Total</td>
        ${colTotals.map(t=>`<td>${t}</td>`).join('')}
        <td style="background:#eef2ff;">${N}</td>
    </tr></tbody></table>`;

    // Effect size interpretation
    const vLabel = cramersV < 0.1 ? 'negligible' : cramersV < 0.3 ? 'small' : cramersV < 0.5 ? 'medium' : 'large';

    lastResults['Chi-Square for Independence'] =
        `χ²(${df})=${chiSq.toFixed(3)}, p=${fmtP(p)}, V=${cramersV.toFixed(3)}, N=${N}`;

    resEl.innerHTML = `
        <h3>${rowVar} × ${colVar} &nbsp; <span style="font-size:0.8em;font-weight:400;color:#718096;">(${R}×${C} contingency table, N = ${N})</span></h3>
        ${smallCells>0 ? `<div class="warning-box">⚠ ${smallCells} of ${R*C} cells have expected frequency &lt; 5. Chi-square approximation may be unreliable — consider collapsing categories or Fisher's exact test.</div>` : ''}
        <p style="font-size:0.82em;color:#718096;margin-bottom:8px;">
            Each cell shows: <strong>observed count</strong> / <span style="color:#718096;">expected count</span> / <span style="color:#a0aec0;">(O−E)²/E contribution)</span>.
            ${smallCells>0?'<span style="background:#fff8e1;padding:1px 4px;border-radius:3px;">Yellow</span> = expected &lt; 5.':''}
        </p>
        ${tblHtml}
        <div style="margin-top:12px;padding:10px 14px;background:#f8f9fa;border-radius:6px;font-size:0.9em;display:flex;flex-wrap:wrap;gap:20px;">
            <span><strong>χ²</strong> = ${chiSq.toFixed(3)}</span>
            <span><strong>df</strong> = (${R}−1)×(${C}−1) = ${df}</span>
            <span><strong>p-value</strong> = ${fmtP(p)}</span>
            <span><strong>Cramér's V</strong> = ${cramersV.toFixed(3)} <span style="color:#718096;">(${vLabel} effect)</span></span>
        </div>
        ${yatesInfo}`;

    const sig = p < 0.05;
    intEl.style.display = '';
    intEl.innerHTML = `
        <strong>χ²(${df}) = ${chiSq.toFixed(3)}, p = ${fmtP(p)}</strong><br>
        ${sig
            ? `✓ <strong>Significant association</strong> between ${rowVar} and ${colVar} at α = 0.05. The two variables are not independent.`
            : `✗ <strong>No significant association</strong> detected between ${rowVar} and ${colVar} (p ≥ 0.05). The data are consistent with independence.`}
        <br>
        <strong>Effect size:</strong> Cramér's V = ${cramersV.toFixed(3)} — ${vLabel}
        (V conventions: &lt;0.1 negligible, 0.1–0.3 small, 0.3–0.5 medium, &gt;0.5 large).
        <br>
        <strong>df</strong> = (rows − 1) × (cols − 1) = (${R}−1) × (${C}−1) = ${df}.
        Under H₀, each expected count = (row total × col total) / N.`;
}

function initANOVA(){updateANOVA();}
function updateANOVA(){
    const selResp=getSelectedCheckboxes('anovaResp'),selGroup=getSelectedRadio('anovaGroup');
    if(!selResp.length||!selGroup)return;
    const groups=[...new Set(data.map(d=>d[selGroup]).filter(g=>g!==undefined&&g!==''))];

        data.forEach(d=>{if(d[selGroup]in gData&&typeof d[rv]==='number'&&!isNaN(d[rv]))gData[d[selGroup]].push(d[rv]);});
        const allVals=groups.flatMap(g=>gData[g]);if(!allVals.length)return;
        const N=allVals.length,grandMean=allVals.reduce((a,b)=>a+b,0)/N;
        let SSB=0,SSW=0;
        groups.forEach(g=>{const vals=gData[g];if(!vals.length)return;const gm=vals.reduce((a,b)=>a+b,0)/vals.length;SSB+=vals.length*(gm-grandMean)**2;vals.forEach(v=>SSW+=(v-gm)**2);});

    const rect = el.getBoundingClientRect();
    const TW = 270, TH = 150;
    const VW = window.innerWidth, VH = window.innerHeight;
    // Prefer showing to the right of the element; fall back to left
    let left = rect.right + 10;
    if (left + TW > VW - 8) left = rect.left - TW - 10;
    left = Math.max(8, Math.min(VW - TW - 8, left));
    // Prefer aligning top with element; clamp to viewport
    let top = rect.top;
    top = Math.max(8, Math.min(VH - TH - 8, top));
    tip.style.left = left + 'px';
    tip.style.top  = top  + 'px';
}

loadSampleData();
